    langfuseEnabled: "false"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

platformBackend:
  name: platform-backend
  replicas: 1
  image:
    repository: katonic/platform-backend
    tag: latest
    pullPolicy: Always
  service:
    port: 3002
    targetPort: 3002
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

remoteConnections:
  name: remote-connections
  replicas: 1
  image:
    repository: katonic/remote-connections
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8014
    targetPort: 8014
  env:
    debug: "false"
    jwtAlgorithm: "HS256"
    defaultToolTimeout: "30.0"
    specFetchTimeout: "15.0"
    healthCheckTimeout: "10.0"
    mcpSseTimeout: "60.0"
    mcpSseReconnectDelay: "5.0"
    healthCheckInterval: "300"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

workspaceService:
  name: workspace-service
  replicas: 1
  image:
    repository: katonic/workspace-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8013
    targetPort: 8013
  env:
    orgName: "katonic"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Frontend
# -----------------------------------------------------------------------------
frontend:
  name: katonic-frontend
  replicas: 1
  image:
    repository: katonic/katonic-frontend
    tag: latest
    pullPolicy: Always
  service:
    port: 3000
    targetPort: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  startupProbe:
    failureThreshold: 15
    periodSeconds: 10
    timeoutSeconds: 3
  readinessProbe:
    periodSeconds: 10
    timeoutSeconds: 3
  livenessProbe:
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 5

# -----------------------------------------------------------------------------
# Infrastructure — ClickHouse + Redis only (Postgres is external)
# -----------------------------------------------------------------------------
infra:

  redis:
    namespace: katonic
    service:
      name: redis
      selector: redis
      port: 6379
      targetPort: 6379
    statefulSet:
      name: redis
      serviceName: redis
      replicas: 1
      selector: redis
      sidecarInject: "false"
      container:
        image: redis:7-alpine
        port: 6379
        maxMemory: 512mb
        maxMemoryPolicy: allkeys-lru
        appendOnly: "yes"
        mountPath: /data
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
      volume:
        storage: 2Gi
    probes:
      startup:
        failureThreshold: 15
        periodSeconds: 10
        timeoutSeconds: 3
      readiness:
        periodSeconds: 5
      liveness:
        periodSeconds: 10
        failureThreshold: 5

  clickhouse:
    namespace: katonic
    image:
      repository: clickhouse/clickhouse-server
      tag: "24.3"
      pullPolicy: IfNotPresent
    service:
      ports:
        http: 8123
        native: 9000
    statefulset:
      replicas: 1
    clickhouse:
      db: platform
      user: default
    secrets:
      clickhouse: platform-secret
      passwordKey: CLICKHOUSE_PASSWORD
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 4Gi
    storage:
      size: 10Gi
    initSQL: |
      CREATE DATABASE IF NOT EXISTS platform;
      CREATE USER IF NOT EXISTS platform_svc IDENTIFIED BY 'change_me_clickhouse';
      GRANT SELECT, INSERT ON platform.* TO platform_svc;
      USE platform;
      CREATE TABLE IF NOT EXISTS llm_usage_events (event_id String, timestamp DateTime64(3), trace_id String DEFAULT '', tenant_id String DEFAULT 'default', user_id String DEFAULT '', user_team String DEFAULT '', agent_id String DEFAULT '', agent_version String DEFAULT '', session_id String DEFAULT '', tier String DEFAULT '', provider String DEFAULT '', model String DEFAULT '', tokens_input UInt32 DEFAULT 0, tokens_output UInt32 DEFAULT 0, cost_usd Float64 DEFAULT 0.0, latency_ms UInt32 DEFAULT 0, ttft_ms Nullable(UInt32), status String DEFAULT 'success', error_type Nullable(String), is_fallback UInt8 DEFAULT 0, fallback_from Nullable(String), is_cached UInt8 DEFAULT 0) ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 180 DAY SETTINGS index_granularity = 8192;
      CREATE TABLE IF NOT EXISTS tool_usage_events (event_id String, timestamp DateTime64(3), trace_id String DEFAULT '', tenant_id String DEFAULT 'default', user_id String DEFAULT '', user_team String DEFAULT '', agent_id String DEFAULT '', session_id String DEFAULT '', server_type String DEFAULT '', server_name String DEFAULT '', tool_name String DEFAULT '', risk_level String DEFAULT 'low', approval_status String DEFAULT 'not_required', approved_by Nullable(String), latency_ms UInt32 DEFAULT 0, status String DEFAULT 'success', error_type Nullable(String), pii_input UInt8 DEFAULT 0, pii_output UInt8 DEFAULT 0, pii_action Nullable(String)) ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 180 DAY SETTINGS index_granularity = 8192;
      CREATE TABLE IF NOT EXISTS admin_action_events (event_id String, timestamp DateTime64(3), trace_id String DEFAULT '', tenant_id String DEFAULT 'default', user_id String DEFAULT '', user_team String DEFAULT '', action_type String DEFAULT '', resource_type String DEFAULT '', resource_id String DEFAULT '', changes String DEFAULT '{}', ip_address Nullable(String)) ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 90 DAY SETTINGS index_granularity = 8192;
      CREATE TABLE IF NOT EXISTS guardrail_events (event_id String, timestamp DateTime64(3), trace_id String DEFAULT '', tenant_id String DEFAULT 'default', user_id String DEFAULT '', agent_id String DEFAULT '', session_id String DEFAULT '', direction String DEFAULT 'input', rail_type String DEFAULT '', result String DEFAULT 'pass', confidence Float64 DEFAULT 1.0, details String DEFAULT '{}', latency_ms UInt32 DEFAULT 0) ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 180 DAY SETTINGS index_granularity = 8192;
      CREATE TABLE IF NOT EXISTS governance_tool_events (event_id String, timestamp DateTime64(3), tenant_id String DEFAULT 'default', user_id String DEFAULT '', team_id String DEFAULT '', agent_id String DEFAULT '', session_id String DEFAULT '', server_name String DEFAULT '', tool_name String DEFAULT '', risk_level String DEFAULT 'low', decision String DEFAULT 'allow', policy_ids String DEFAULT '', pii_detected UInt8 DEFAULT 0, pii_entity_count UInt32 DEFAULT 0, pii_entity_types String DEFAULT '', output_redacted UInt8 DEFAULT 0, latency_ms UInt32 DEFAULT 0, error String DEFAULT '') ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 365 DAY SETTINGS index_granularity = 8192;
      CREATE MATERIALIZED VIEW IF NOT EXISTS mv_llm_hourly_stats ENGINE = SummingMergeTree() PARTITION BY toYYYYMM(hour) ORDER BY (tenant_id, hour, tier, provider) AS SELECT toStartOfHour(timestamp) AS hour, tenant_id, tier, provider, count() AS requests, sum(tokens_input) AS input_tokens, sum(tokens_output) AS output_tokens, sum(cost_usd) AS cost_usd, sum(latency_ms) AS total_latency_ms, countIf(status = 'error') AS errors FROM llm_usage_events GROUP BY hour, tenant_id, tier, provider;

# -----------------------------------------------------------------------------
# Istio mesh config
# -----------------------------------------------------------------------------
gateway:
  name: kt-gateway
  namespace: istio-system
  selector: ingressgateway
  servers:
    - port:
        name: https
        number: 443
        protocol: HTTPS
      tls:
        cipherSuites:
          - ECDHE-ECDSA-AES128-GCM-SHA256
          - ECDHE-ECDSA-AES256-GCM-SHA384
          - ECDHE-RSA-AES128-GCM-SHA256
          - ECDHE-RSA-AES256-GCM-SHA384
          - ECDHE-RSA-CHACHA20-POLY1305
        credentialName: kt-certs
        maxProtocolVersion: TLSV1_3
        minProtocolVersion: TLSV1_2
        mode: SIMPLE
    - port:
        name: http
        number: 80
        protocol: HTTP
      tls:
        httpsRedirect: true

peerAuth:
  - name: katonic-default
    namespace: katonic
    mtlsMode: PERMISSIVE

destinationRules:
  - name: admin-api
    host: admin-api
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: agent-api
    host: agent-api
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: agent-runtime
    host: agent-runtime
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 50
        idleTimeout: 300s
      tcp:
        maxConnections: 200
        connectTimeout: 30s
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 60s
      baseEjectionTime: 60s
      maxEjectionPercent: 30
  - name: ai-gateway
    host: ai-gateway
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 50
        idleTimeout: 300s
      tcp:
        maxConnections: 200
        connectTimeout: 30s
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 60s
      baseEjectionTime: 60s
      maxEjectionPercent: 30
  - name: eval-engine
    host: eval-engine
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 50
        idleTimeout: 180s
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: governance-proxy
    host: governance-proxy
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 50
        idleTimeout: 120s
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
  - name: guardrails-engine
    host: guardrails-engine
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 50
        idleTimeout: 120s
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
  - name: knowledge-engine
    host: knowledge-engine
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 50
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: mcp-gateway
    host: mcp-gateway
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: model-deployment-service
    host: model-deployment-service
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: observability
    host: observability
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: platform-backend
    host: platform-backend
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: remote-connections
    host: remote-connections
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: workspace-service
    host: workspace-service
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: katonic-frontend
    host: katonic-frontend
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  # Infrastructure: DISABLE mTLS (no sidecars)
  - name: postgres
    host: postgres
    tlsMode: DISABLE
  - name: redis
    host: redis
    tlsMode: DISABLE
  - name: clickhouse
    host: clickhouse
    tlsMode: DISABLE

allowAllApps:
  - name: frontend
    app: katonic-frontend
  - name: platform-backend
    app: platform-backend

virtualServices:
  - name: katonic-ingress
    namespace: katonic
    useGateway: true
    routes:
      - host: katonic-frontend.katonic.svc.cluster.local
        port: 3000
  - name: ai-gateway-internal
    namespace: katonic
    useGateway: false
    internalHost: ai-gateway.katonic.svc.cluster.local
    routes:
      - host: ai-gateway.katonic.svc.cluster.local
        port: 8010
    timeout: 300s
    retries:
      attempts: 1
      retryOn: connect-failure
  - name: eval-engine-internal
    namespace: katonic
    useGateway: false
    internalHost: eval-engine.katonic.svc.cluster.local
    routes:
      - host: eval-engine.katonic.svc.cluster.local
        port: 8015
    timeout: 180s
    retries:
      attempts: 1
      retryOn: connect-failure
  - name: agent-runtime-internal
    namespace: katonic
    useGateway: false
    internalHost: agent-runtime.katonic.svc.cluster.local
    routes:
      - host: agent-runtime.katonic.svc.cluster.local
        port: 8000
    timeout: 300s
    retries:
      attempts: 1
      retryOn: connect-failure

# -----------------------------------------------------------------------------
# Jobs
# -----------------------------------------------------------------------------
job:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600

image:
  postgres: "postgres:16-alpine"
  seedAll: "katonic/seed-all:latest"
  pullPolicy: Always

milvus:
  uri: "http://milvus:19530"

tenantId: "default"

imagePullSecrets:
  - dockerhub-secret

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi


