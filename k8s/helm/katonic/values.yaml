        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: katonic-frontend
    host: katonic-frontend
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: keycloak
    host: keycloak
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: postgres
    host: postgres
    tlsMode: DISABLE
  - name: redis
    host: redis
    tlsMode: DISABLE
  - name: clickhouse
    host: clickhouse
    tlsMode: DISABLE

jwtPublicPaths:
  - "/health*"
  - "/ready*"
  - "/metrics*"
  - "/docs*"
  - "/openapi.json"
  - "/redoc"
  - "/healthz"
  - "/v1/health/*"

allowAllApps:
  - name: frontend
    app: katonic-frontend
  - name: keycloak
    app: keycloak
  - name: platform-backend
    app: platform-backend

virtualServices:
  - name: katonic-ingress
    namespace: katonic
    useGateway: true
    routes:
      - host: katonic-frontend.katonic.svc.cluster.local
        port: 3000
  - name: ai-gateway-internal
    namespace: katonic
    useGateway: false
    internalHost: ai-gateway.katonic.svc.cluster.local
    routes:
      - host: ai-gateway.katonic.svc.cluster.local
        port: 8010
    timeout: 300s
    retries:
      attempts: 1
      retryOn: connect-failure
  - name: eval-engine-internal
    namespace: katonic
    useGateway: false
    internalHost: eval-engine.katonic.svc.cluster.local
    routes:
      - host: eval-engine.katonic.svc.cluster.local
        port: 8015
    timeout: 180s
    retries:
      attempts: 1
      retryOn: connect-failure
  - name: agent-runtime-internal
    namespace: katonic
    useGateway: false
    internalHost: agent-runtime.katonic.svc.cluster.local
    routes:
      - host: agent-runtime.katonic.svc.cluster.local
        port: 8000
    timeout: 300s
    retries:
      attempts: 1
      retryOn: connect-failure

# -----------------------------------------------------------------------------
# Jobs
# -----------------------------------------------------------------------------
job:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600

image:
  postgres: "postgres:16-alpine"
  seedAll: "katonic/seed-all:latest"
  waitCurl: "curlimages/curl:8.5.0"
  seed: "python:3.12-slim"
  pullPolicy: Always

postgres:
  host: postgres
  port: 5432
  db: platform
  user: platform

milvus:
  uri: "http://milvus:19530"

tenantId: "default"

imagePullSecrets:
  - dockerhub-secret

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

keycloak:
  url: "http://keycloak:8080/auth"
  adminUserSecret: KEYCLOAK_ADMIN_USER
  adminPassSecret: KEYCLOAK_ADMIN_PASSWORD
  clientSecretSecret: KEYCLOAK_CLIENT_SECRET
