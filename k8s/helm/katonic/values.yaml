    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
    targetPort: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

agentApi:
  name: agent-api
  replicas: 1
  containerPort: 8000
  image:
    repository: katonic/agent-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
    targetPort: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

agentRuntime:
  name: agent-runtime
  replicas: 1
  containerPort: 8000
  image:
    repository: katonic/agent-runtime
    tag: latest
    pullPolicy: Always
  service:
    port: 8000
    targetPort: 8000
  redisUrl: redis://redis:6379
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

aiGateway:
  name: ai-gateway
  replicas: 1
  containerPort: 8010
  image:
    repository: katonic/ai-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8010
    targetPort: 8010
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

evalEngine:
