# -----------------------------------------------------------------------------
# Frontend
# -----------------------------------------------------------------------------
frontend:
  name: katonic-frontend
  replicas: 1
  image:
    repository: katonic/katonic-frontend
    tag: latest
    pullPolicy: Always
  service:
    port: 3000
    targetPort: 3000
  imagePullSecret: dockerhub-secret
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  startupProbe:
    failureThreshold: 15
    periodSeconds: 10
    timeoutSeconds: 3
  readinessProbe:
    periodSeconds: 10
    timeoutSeconds: 3
  livenessProbe:
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 5

# -----------------------------------------------------------------------------
# Infrastructure
# -----------------------------------------------------------------------------
infra:

  postgres:
    namespace: katonic
    service:
      name: postgres
      selector: postgres
      port: 5432
      targetPort: 5432
    configMap:
      name: postgres-init
      initSQL: |
        CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        CREATE EXTENSION IF NOT EXISTS "pgcrypto";
        CREATE EXTENSION IF NOT EXISTS "pg_trgm";
        REVOKE CREATE ON SCHEMA public FROM PUBLIC;
        REVOKE ALL ON DATABASE platform FROM PUBLIC;
        DO $$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'svc_admin') THEN
            CREATE ROLE svc_admin LOGIN PASSWORD 'change_me_admin';
          END IF;
        END $$;
        GRANT CONNECT ON DATABASE platform TO svc_admin;
        GRANT USAGE ON SCHEMA public TO svc_admin;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO svc_admin;
        DO $$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'svc_observability') THEN
            CREATE ROLE svc_observability LOGIN PASSWORD 'change_me_obs';
          END IF;
        END $$;
        GRANT CONNECT ON DATABASE platform TO svc_observability;
        GRANT USAGE ON SCHEMA public TO svc_observability;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE ON TABLES TO svc_observability;
        GRANT USAGE ON SCHEMA public TO platform;
        CREATE DATABASE keycloak OWNER platform;
        REVOKE ALL ON DATABASE keycloak FROM PUBLIC;
        CREATE DATABASE knowledge_engine OWNER platform;
        REVOKE ALL ON DATABASE knowledge_engine FROM PUBLIC;
        DO $$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'svc_knowledge') THEN
            CREATE ROLE svc_knowledge LOGIN PASSWORD 'change_me_ke';
          END IF;
        END $$;
        GRANT CONNECT ON DATABASE knowledge_engine TO svc_knowledge;
    statefulSet:
      name: postgres
      serviceName: postgres
      replicas: 1
      selector: postgres
      sidecarInject: "false"
      container:
        image: postgres:16-alpine
        port: 5432
        db: platform
        dbUser: platform
        mountPath: /var/lib/postgresql/data
        pgdata: /var/lib/postgresql/data/pgdata
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
      volume:
        storage: 5Gi
    secrets:
      user:
        name: platform-secret
        key: POSTGRES_USER
      password:
        name: platform-secret
        key: POSTGRES_PASSWORD
    probes:
      startup:
        failureThreshold: 30
        periodSeconds: 10
        timeoutSeconds: 3
      readiness:
        periodSeconds: 5
      liveness:
        periodSeconds: 10
        failureThreshold: 5

  redis:
    namespace: katonic
    service:
      name: redis
      selector: redis
      port: 6379
      targetPort: 6379
    statefulSet:
      name: redis
      serviceName: redis
      replicas: 1
      selector: redis
      sidecarInject: "false"
      container:
        image: redis:7-alpine
        port: 6379
        maxMemory: 512mb
        maxMemoryPolicy: allkeys-lru
        appendOnly: "yes"
        mountPath: /data
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
      volume:
        storage: 2Gi
    probes:
      startup:
        failureThreshold: 15
        periodSeconds: 10
        timeoutSeconds: 3
      readiness:
        periodSeconds: 5
      liveness:
        periodSeconds: 10
        failureThreshold: 5

  clickhouse:
    namespace: katonic
    image:
      repository: clickhouse/clickhouse-server
      tag: "24.3"
      pullPolicy: IfNotPresent
    service:
      ports:
        http: 8123
        native: 9000
    statefulset:
      replicas: 1
    clickhouse:
      db: platform
      user: default
    secrets:
      clickhouse: platform-secret
      passwordKey: CLICKHOUSE_PASSWORD
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 4Gi
    storage:
      size: 10Gi
    initSQL: |
      CREATE DATABASE IF NOT EXISTS platform;
      CREATE USER IF NOT EXISTS platform_svc IDENTIFIED BY 'change_me_clickhouse';
      GRANT SELECT, INSERT ON platform.* TO platform_svc;
      USE platform;
      CREATE TABLE IF NOT EXISTS llm_usage_events (event_id String, timestamp DateTime64(3), trace_id String DEFAULT '', tenant_id String DEFAULT 'default', user_id String DEFAULT '', user_team String DEFAULT '', agent_id String DEFAULT '', agent_version String DEFAULT '', session_id String DEFAULT '', tier String DEFAULT '', provider String DEFAULT '', model String DEFAULT '', tokens_input UInt32 DEFAULT 0, tokens_output UInt32 DEFAULT 0, cost_usd Float64 DEFAULT 0.0, latency_ms UInt32 DEFAULT 0, ttft_ms Nullable(UInt32), status String DEFAULT 'success', error_type Nullable(String), is_fallback UInt8 DEFAULT 0, fallback_from Nullable(String), is_cached UInt8 DEFAULT 0) ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 180 DAY SETTINGS index_granularity = 8192;
      CREATE TABLE IF NOT EXISTS tool_usage_events (event_id String, timestamp DateTime64(3), trace_id String DEFAULT '', tenant_id String DEFAULT 'default', user_id String DEFAULT '', user_team String DEFAULT '', agent_id String DEFAULT '', session_id String DEFAULT '', server_type String DEFAULT '', server_name String DEFAULT '', tool_name String DEFAULT '', risk_level String DEFAULT 'low', approval_status String DEFAULT 'not_required', approved_by Nullable(String), latency_ms UInt32 DEFAULT 0, status String DEFAULT 'success', error_type Nullable(String), pii_input UInt8 DEFAULT 0, pii_output UInt8 DEFAULT 0, pii_action Nullable(String)) ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 180 DAY SETTINGS index_granularity = 8192;
      CREATE TABLE IF NOT EXISTS admin_action_events (event_id String, timestamp DateTime64(3), trace_id String DEFAULT '', tenant_id String DEFAULT 'default', user_id String DEFAULT '', user_team String DEFAULT '', action_type String DEFAULT '', resource_type String DEFAULT '', resource_id String DEFAULT '', changes String DEFAULT '{}', ip_address Nullable(String)) ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 90 DAY SETTINGS index_granularity = 8192;
      CREATE TABLE IF NOT EXISTS guardrail_events (event_id String, timestamp DateTime64(3), trace_id String DEFAULT '', tenant_id String DEFAULT 'default', user_id String DEFAULT '', agent_id String DEFAULT '', session_id String DEFAULT '', direction String DEFAULT 'input', rail_type String DEFAULT '', result String DEFAULT 'pass', confidence Float64 DEFAULT 1.0, details String DEFAULT '{}', latency_ms UInt32 DEFAULT 0) ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 180 DAY SETTINGS index_granularity = 8192;
      CREATE TABLE IF NOT EXISTS governance_tool_events (event_id String, timestamp DateTime64(3), tenant_id String DEFAULT 'default', user_id String DEFAULT '', team_id String DEFAULT '', agent_id String DEFAULT '', session_id String DEFAULT '', server_name String DEFAULT '', tool_name String DEFAULT '', risk_level String DEFAULT 'low', decision String DEFAULT 'allow', policy_ids String DEFAULT '', pii_detected UInt8 DEFAULT 0, pii_entity_count UInt32 DEFAULT 0, pii_entity_types String DEFAULT '', output_redacted UInt8 DEFAULT 0, latency_ms UInt32 DEFAULT 0, error String DEFAULT '') ENGINE = MergeTree() PARTITION BY toYYYYMM(timestamp) ORDER BY (tenant_id, timestamp, event_id) TTL toDateTime(timestamp) + INTERVAL 365 DAY SETTINGS index_granularity = 8192;
      CREATE MATERIALIZED VIEW IF NOT EXISTS mv_llm_hourly_stats ENGINE = SummingMergeTree() PARTITION BY toYYYYMM(hour) ORDER BY (tenant_id, hour, tier, provider) AS SELECT toStartOfHour(timestamp) AS hour, tenant_id, tier, provider, count() AS requests, sum(tokens_input) AS input_tokens, sum(tokens_output) AS output_tokens, sum(cost_usd) AS cost_usd, sum(latency_ms) AS total_latency_ms, countIf(status = 'error') AS errors FROM llm_usage_events GROUP BY hour, tenant_id, tier, provider;

  keycloak:
    namespace: katonic
    replicaCount: 1
    image:
      repository: quay.io/keycloak/keycloak
      tag: "26.0"
      pullPolicy: IfNotPresent
    ports:
      http: 8080
      management: 9000
    service:
      name: keycloak
      type: ClusterIP
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    configMapName: platform-config
    secretName: platform-secret
    keycloak:
      dbName: keycloak
      dbSchema: public
      hostnameStrict: "false"
      httpEnabled: "true"
      httpRelativePath: "/auth"
      proxyHeaders: "xforwarded"
      healthEnabled: "true"
      metricsEnabled: "true"

  modelCache:
    namespace: katonic
    pvc:
      name: model-cache
      accessMode: ReadWriteMany
      storageClassName: azurefile-nfs
      storage: 50Gi
    labels:
      partOf: katonic-platform
      component: model-cache
    storageClass:
      name: azurefile-nfs
      provisioner: file.csi.azure.com
      parameters:
        protocol: nfs
        skuName: Premium_LRS
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      mountOptions:
        - nconnect=4
        - hard
        - noresvport

# -----------------------------------------------------------------------------
# Istio — all domain references injected from .Values.domain
# -----------------------------------------------------------------------------
gateway:
  name: kt-gateway
  namespace: istio-system
  selector: ingressgateway
  servers:
    - port:
        name: https
        number: 443
        protocol: HTTPS
      tls:
        cipherSuites:
          - ECDHE-ECDSA-AES128-GCM-SHA256
          - ECDHE-ECDSA-AES256-GCM-SHA384
          - ECDHE-RSA-AES128-GCM-SHA256
          - ECDHE-RSA-AES256-GCM-SHA384
          - ECDHE-RSA-CHACHA20-POLY1305
        credentialName: kt-certs
        maxProtocolVersion: TLSV1_3
        minProtocolVersion: TLSV1_2
        mode: SIMPLE
    - port:
        name: http
        number: 80
        protocol: HTTP
      tls:
        httpsRedirect: true

peerAuth:
  - name: katonic-default
    namespace: katonic
    mtlsMode: PERMISSIVE
  - name: keycloak-permissive
    namespace: katonic
    selector:
      app: keycloak
    mtlsMode: PERMISSIVE

requestAuth:
  name: keycloak-jwt
  namespace: katonic
  forwardOriginalToken: true
  audiences:
    - "account"
    - "platform-api"
    - "platform-ui"

destinationRules:
  - name: admin-api
    host: admin-api
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  - name: agent-api
    host: agent-api
    tlsMode: ISTIO_MUTUAL
    connectionPool:
      http:
        maxRequestsPerConnection: 100
