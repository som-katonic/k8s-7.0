# =============================================================================
# Katonic 7.0 — Unified Helm Values
# =============================================================================
# How to use:
#   helm upgrade --install katonic ./helm/katonic \
#     --values helm/katonic/values.yaml \
#     --set domain=platform.yourcompany.com
#
# All sensitive values (passwords, secrets) are NOT stored here.
# They are collected interactively by helm-deploy.sh and written to
# the 'platform-secret' Kubernetes Secret before Helm runs.
# =============================================================================

# -----------------------------------------------------------------------------
# Namespace
# -----------------------------------------------------------------------------
namespace: katonic

# -----------------------------------------------------------------------------
# Global — consumed by all backend/frontend deployment templates
# -----------------------------------------------------------------------------
global:
  namespace: katonic
  imagePullPolicy: IfNotPresent
  imagePullSecret: dockerhub-secret
  configMap: platform-config
  secret: platform-secret

# -----------------------------------------------------------------------------
# Environment  (dev | staging | production)
# -----------------------------------------------------------------------------
environment: production

# -----------------------------------------------------------------------------
# DOMAIN — single source of truth.
# Set via:  --set domain=platform.yourcompany.com
#
# Flows into:
#   Istio Gateway hosts
#   Istio VirtualService (gateway host)
#   Istio RequestAuthentication issuer URL
#   Keycloak --hostname arg
#   platform-config ConfigMap  (KEYCLOAK_ISSUER, KEYCLOAK_SERVER_URL)
#   seed-keycloak redirect URIs
# -----------------------------------------------------------------------------
domain: "preview.katonic.ai"

# -----------------------------------------------------------------------------
# Super-admin user  (created in Keycloak by seed-keycloak job)
# Password is NEVER stored here — collected by helm-deploy.sh at deploy time
# and written into platform-secret (key: KATONIC_ADMIN_PASSWORD).
# Override email: --set superAdmin.email=you@yourcompany.com
# -----------------------------------------------------------------------------
superAdmin:
  email: "admin@katonic.ai"
  firstName: "Platform"
  lastName: "Admin"
  tenantId: "default"
  teams: "engineering,platform"
  department: "Engineering"
  role: "platform_admin"

# -----------------------------------------------------------------------------
# Image registry
# Leave empty for DockerHub.  Set to e.g. "katonic.azurecr.io/" for ACR.
# -----------------------------------------------------------------------------
imageRegistry: ""

# -----------------------------------------------------------------------------
# Resource Quota  (applied to the katonic namespace)
# -----------------------------------------------------------------------------
resourceQuota:
  enabled: true
  cpu: "16"
  memory: "48Gi"
  storage: "512Gi"

# -----------------------------------------------------------------------------
# Workspace timeout (hours) — passed to workspace-service as env var
# -----------------------------------------------------------------------------
workspaceTimeoutHours: "12"

# -----------------------------------------------------------------------------
# SMTP
# Set enabled: true and fill in values to use your own mail server.
# When enabled: false the platform uses Katonic's default SendGrid.
# -----------------------------------------------------------------------------
smtp:
  enabled: false
  host: ""
  port: 465
  user: ""
  from: "support@katonic.ai"
  ssl: true
  auth: true
  # Password is collected by helm-deploy.sh and stored in platform-secret
  # under key SMTP_PASSWORD — never stored here.

