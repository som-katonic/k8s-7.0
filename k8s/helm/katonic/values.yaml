# =============================================================================
# Katonic 7.0 — Unified Helm Values
# =============================================================================
# How to use:
#   helm upgrade --install katonic ./helm/katonic \
#     --values helm/katonic/values.yaml \
#     --set domain=platform.yourcompany.com
#
# All sensitive values (passwords, secrets) are NOT stored here.
# They are collected interactively by helm-deploy.sh and written to
# the 'platform-secret' Kubernetes Secret before Helm runs.
# =============================================================================

# -----------------------------------------------------------------------------
# Namespace
# -----------------------------------------------------------------------------
namespace: katonic

# -----------------------------------------------------------------------------
# Global — consumed by all backend/frontend deployment templates
# -----------------------------------------------------------------------------
global:
  namespace: katonic
  imagePullPolicy: IfNotPresent
  imagePullSecret: dockerhub-secret
  configMap: platform-config
  secret: platform-secret

# -----------------------------------------------------------------------------
# Environment  (dev | staging | production)
# -----------------------------------------------------------------------------
environment: production

# -----------------------------------------------------------------------------
# DOMAIN — single source of truth.
# Set via:  --set domain=platform.yourcompany.com
#
# Flows into:
#   Istio Gateway hosts
#   Istio VirtualService (gateway host)
#   platform-config ConfigMap  (PLATFORM_DOMAIN)
# -----------------------------------------------------------------------------
domain: "preview.katonic.ai"

# -----------------------------------------------------------------------------
# Image registry
# Leave empty for DockerHub.  Set to e.g. "katonic.azurecr.io/" for ACR.
# -----------------------------------------------------------------------------
imageRegistry: ""

# -----------------------------------------------------------------------------
# Resource Quota  (applied to the katonic namespace)
# -----------------------------------------------------------------------------
resourceQuota:
  enabled: true
  cpu: "16"
  memory: "48Gi"
  storage: "512Gi"

# -----------------------------------------------------------------------------
# Workspace timeout (hours)
# -----------------------------------------------------------------------------
workspaceTimeoutHours: "12"

# -----------------------------------------------------------------------------
# SMTP
# -----------------------------------------------------------------------------
smtp:
  enabled: false
  host: ""
  port: 465
  user: ""
  from: "support@katonic.ai"
  ssl: true
  auth: true

# -----------------------------------------------------------------------------
# PostgreSQL — EXTERNAL.
# The full URL is stored in platform-secret (key: POSTGRES_URL).
# These values are parsed by helm-deploy.sh from the URL and injected via
# --set so the ConfigMap template can render static host/port/db.
# -----------------------------------------------------------------------------
postgres:
  host: "localhost"
  port: "5432"
  db: "platform"
  user: "postgres"

# -----------------------------------------------------------------------------
# Istio pre-install job
# When istio.enabled=true, a pre-install Helm hook runs istioctl inside
# the cluster to install Istio before any application resources are created.
# Set to false if Istio is already installed on the target cluster.
# -----------------------------------------------------------------------------
istio:
  enabled: false
  image: "docker.io/istio/istioctl:1.26.0"
  imageRegistry: ""
  pilotImage: "docker.io/istio/pilot:1.26.0"

# -----------------------------------------------------------------------------
# Backend services
# -----------------------------------------------------------------------------
adminApi:
