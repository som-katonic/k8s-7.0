    k8sInCluster: "true"
    vllmImage: "vllm/vllm-openai:latest"
    tgiImage: "ghcr.io/huggingface/text-generation-inference:latest"
    nimImagePrefix: "nvcr.io/nim"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

observability:
  name: observability
  replicas: 1
  image:
    repository: katonic/observability
    tag: latest
    pullPolicy: IfNotPresent
