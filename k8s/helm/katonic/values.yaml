  replicas: 1
  containerPort: 8015
  image:
    repository: katonic/eval-engine
    tag: latest
    pullPolicy: Always
  service:
    port: 8015
    targetPort: 8015
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

governanceProxy:
  name: governance-proxy
  replicas: 1
  containerPort: 8000
  image:
    repository: katonic/governance-proxy
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
    targetPort: 8000
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

guardrailsEngine:
  name: guardrails-engine
  replicas: 1
  containerPort: 8000
  image:
    repository: katonic/guardrails-engine
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
    targetPort: 8000
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

knowledgeEngine:
  name: knowledge-engine
  replicas: 1
  containerPort: 8011
  image:
    repository: katonic/knowledge-engine
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8011
    targetPort: 8011
  milvus:
    host: "milvus"
    port: "19530"
  minio:
    endpoint: "minio:9000"
  debug: "false"
  permissions:
    failClosed: "false"
  auth:
    enabled: "false"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

mcpGateway:
  name: mcp-gateway
  replicas: 1
  containerPort: 8009
  timeout: "15"
  image:
    repository: katonic/mcp-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8009
    targetPort: 8009
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

modelDeploymentService:
  name: model-deployment-service
  replicas: 1
  containerPort: 8012
  image:
    repository: katonic/model-deployment-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8012
    targetPort: 8012
