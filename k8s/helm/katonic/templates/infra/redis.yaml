apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.service.selector }}
  ports:
    - name: tcp-redis
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.statefulSet.name }}
  namespace: {{ .Values.namespace }}
spec:
  serviceName: {{ .Values.statefulSet.serviceName }}
  replicas: {{ .Values.statefulSet.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.statefulSet.selector }}
  template:
    metadata:
      labels:
        app: {{ .Values.statefulSet.selector }}
      annotations:
        sidecar.istio.io/inject: "{{ .Values.statefulSet.sidecarInject }}"
    spec:
      containers:
        - name: redis
          image: {{ .Values.statefulSet.container.image }}
          command:
            - redis-server
            - --maxmemory
            - {{ .Values.statefulSet.container.maxMemory }}
            - --maxmemory-policy
            - {{ .Values.statefulSet.container.maxMemoryPolicy }}
            - --appendonly
            - "{{ .Values.statefulSet.container.appendOnly }}"
          ports:
            - containerPort: {{ .Values.statefulSet.container.port }}
          volumeMounts:
            - name: redisdata
              mountPath: {{ .Values.statefulSet.container.mountPath }}
          resources:
            requests:
              cpu: {{ .Values.statefulSet.resources.requests.cpu }}
              memory: {{ .Values.statefulSet.resources.requests.memory }}
            limits:
              cpu: {{ .Values.statefulSet.resources.limits.cpu }}
              memory: {{ .Values.statefulSet.resources.limits.memory }}
          startupProbe:
            exec:
              command: ["redis-cli", "ping"]
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
  volumeClaimTemplates:
    - metadata:
        name: redisdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.statefulSet.volume.storage }}
