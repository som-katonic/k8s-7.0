{{- $fullName := "clickhouse" -}}
{{- $namespace := .Values.infra.clickhouse.namespace -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-init
  namespace: {{ $namespace }}
data:
  init.sql: |
{{ .Values.infra.clickhouse.initSQL | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  namespace: {{ $namespace }}
spec:
  selector:
    app: {{ $fullName }}
  ports:
    - name: http
      port: {{ .Values.infra.clickhouse.service.ports.http }}
      targetPort: {{ .Values.infra.clickhouse.service.ports.http }}
    - name: native
      port: {{ .Values.infra.clickhouse.service.ports.native }}
      targetPort: {{ .Values.infra.clickhouse.service.ports.native }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  namespace: {{ $namespace }}
spec:
  serviceName: {{ $fullName }}
  replicas: {{ .Values.infra.clickhouse.statefulset.replicas }}
  selector:
    matchLabels:
      app: {{ $fullName }}
  template:
    metadata:
      labels:
        app: {{ $fullName }}
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: clickhouse
          image: "{{ .Values.infra.clickhouse.image.repository }}:{{ .Values.infra.clickhouse.image.tag }}"
          imagePullPolicy: {{ .Values.infra.clickhouse.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.infra.clickhouse.service.ports.http }}
            - containerPort: {{ .Values.infra.clickhouse.service.ports.native }}
          env:
            - name: CLICKHOUSE_DB
              value: "{{ .Values.infra.clickhouse.clickhouse.db }}"
            - name: CLICKHOUSE_USER
              value: "{{ .Values.infra.clickhouse.clickhouse.user }}"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.infra.clickhouse.secrets.clickhouse }}
                  key: {{ .Values.infra.clickhouse.secrets.passwordKey }}
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: chdata
              mountPath: /var/lib/clickhouse
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: {{ .Values.infra.clickhouse.resources.requests.cpu }}
              memory: {{ .Values.infra.clickhouse.resources.requests.memory }}
            limits:
              cpu: {{ .Values.infra.clickhouse.resources.limits.cpu }}
              memory: {{ .Values.infra.clickhouse.resources.limits.memory }}
          startupProbe:
            exec:
              command: ["clickhouse-client", "--query", "SELECT 1"]
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["clickhouse-client", "--query", "SELECT 1"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["clickhouse-client", "--query", "SELECT 1"]
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: init-scripts
          configMap:
            name: {{ $fullName }}-init
  volumeClaimTemplates:
    - metadata:
        name: chdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.infra.clickhouse.storage.size }}
