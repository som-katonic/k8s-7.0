apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: {{ .Values.infra.clickhouse.namespace }}
  labels:
    app: clickhouse
spec:
  clusterIP: None
  selector:
    app: clickhouse
  ports:
    - name: http
      port: {{ .Values.infra.clickhouse.service.ports.http }}
      targetPort: {{ .Values.infra.clickhouse.service.ports.http }}
    - name: native
      port: {{ .Values.infra.clickhouse.service.ports.native }}
      targetPort: {{ .Values.infra.clickhouse.service.ports.native }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init
  namespace: {{ .Values.infra.clickhouse.namespace }}
data:
  init.sql: |
    {{ .Values.infra.clickhouse.initSQL | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: {{ .Values.infra.clickhouse.namespace }}
  labels:
    app: clickhouse
spec:
  serviceName: clickhouse
  replicas: {{ .Values.infra.clickhouse.statefulset.replicas }}
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.infra.clickhouse.image.repository }}:{{ .Values.infra.clickhouse.image.tag }}
          imagePullPolicy: {{ .Values.infra.clickhouse.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.infra.clickhouse.service.ports.http }}
            - name: native
              containerPort: {{ .Values.infra.clickhouse.service.ports.native }}
          env:
            - name: CLICKHOUSE_DB
              value: {{ .Values.infra.clickhouse.clickhouse.db | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.infra.clickhouse.clickhouse.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.infra.clickhouse.secrets.clickhouse }}
                  key: {{ .Values.infra.clickhouse.secrets.passwordKey }}
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            {{- toYaml .Values.infra.clickhouse.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.infra.clickhouse.service.ports.http }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.infra.clickhouse.service.ports.http }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: clickhouse-init
          configMap:
            name: clickhouse-init
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.infra.clickhouse.storage.size }}


