---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcpGateway.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.mcpGateway.name }}
spec:
  selector:
    app: {{ .Values.mcpGateway.name }}
  ports:
    - name: http-api
      port: {{ .Values.mcpGateway.service.port }}
      targetPort: {{ .Values.mcpGateway.service.targetPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcpGateway.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.mcpGateway.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.mcpGateway.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcpGateway.name }}
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.mcpGateway.name }}
          image: "{{ .Values.mcpGateway.image.repository }}:{{ .Values.mcpGateway.image.tag }}"
          imagePullPolicy: {{ .Values.mcpGateway.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mcpGateway.containerPort }}
          env:
            - name: PORT
              value: "{{ .Values.mcpGateway.containerPort }}"
            - name: MCP_TIMEOUT
              value: "{{ .Values.mcpGateway.timeout }}"
            - name: ADMIN_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: ADMIN_API_URL
            - name: PLATFORM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: PLATFORM_ENVIRONMENT
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: {{ .Values.mcpGateway.resources.requests.cpu }}
              memory: {{ .Values.mcpGateway.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mcpGateway.resources.limits.cpu }}
              memory: {{ .Values.mcpGateway.resources.limits.memory }}
          startupProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.mcpGateway.containerPort }}
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.mcpGateway.containerPort }}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.mcpGateway.containerPort }}
            periodSeconds: 15
            failureThreshold: 5
