---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.governanceProxy.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.governanceProxy.name }}
spec:
  selector:
    app: {{ .Values.governanceProxy.name }}
  ports:
    - name: http-api
      port: {{ .Values.governanceProxy.service.port }}
      targetPort: {{ .Values.governanceProxy.service.targetPort }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.governanceProxy.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.governanceProxy.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.governanceProxy.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.governanceProxy.name }}
    spec:
      enableServiceLinks: false

      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}

      containers:
        - name: {{ .Values.governanceProxy.name }}

          image: "{{ .Values.governanceProxy.image.repository }}:{{ .Values.governanceProxy.image.tag }}"
          imagePullPolicy: {{ .Values.governanceProxy.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.governanceProxy.containerPort }}

          env:
            - name: GP_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: PLATFORM_ENVIRONMENT

            - name: GP_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: POSTGRES_URL

            - name: GP_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: REDIS_URL

            - name: GP_CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: CLICKHOUSE_HOST

            - name: GP_CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: CLICKHOUSE_PORT

            - name: GP_CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: CLICKHOUSE_DATABASE

            - name: GP_AI_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: AI_GATEWAY_URL

            - name: GP_MCP_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: MCP_GATEWAY_URL

            - name: GP_REMOTE_CONNECTIONS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: REMOTE_CONNECTIONS_URL

            - name: GP_KNOWLEDGE_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KNOWLEDGE_ENGINE_URL

            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: OTEL_ENABLED

            # Keycloak
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_ISSUER

          resources:
            requests:
              cpu: {{ .Values.governanceProxy.resources.requests.cpu }}
              memory: {{ .Values.governanceProxy.resources.requests.memory }}
            limits:
              cpu: {{ .Values.governanceProxy.resources.limits.cpu }}
              memory: {{ .Values.governanceProxy.resources.limits.memory }}

          startupProbe:
            httpGet:
              path: /v1/health/live
              port: {{ .Values.governanceProxy.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60

          readinessProbe:
            httpGet:
              path: /v1/health/live
              port: {{ .Values.governanceProxy.containerPort }}
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: {{ .Values.governanceProxy.containerPort }}
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
