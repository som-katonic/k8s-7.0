---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.knowledgeEngine.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.knowledgeEngine.name }}
spec:
  selector:
    app: {{ .Values.knowledgeEngine.name }}
  ports:
    - name: http-api
      port: {{ .Values.knowledgeEngine.service.port }}
      targetPort: {{ .Values.knowledgeEngine.service.targetPort }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.knowledgeEngine.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.knowledgeEngine.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.knowledgeEngine.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.knowledgeEngine.name }}
    spec:
      enableServiceLinks: false

      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}

      containers:
        - name: {{ .Values.knowledgeEngine.name }}

          image: "{{ .Values.knowledgeEngine.image.repository }}:{{ .Values.knowledgeEngine.image.tag }}"
          imagePullPolicy: {{ .Values.knowledgeEngine.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.knowledgeEngine.containerPort }}

          env:
            - name: KE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: PLATFORM_ENVIRONMENT

            - name: KE_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: KE_POSTGRES_DSN

            - name: KE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: KE_REDIS_URL

            - name: KE_MILVUS_HOST
              value: {{ .Values.knowledgeEngine.milvus.host }}
            - name: KE_MILVUS_PORT
              value: {{ .Values.knowledgeEngine.milvus.port }}

            - name: KE_MINIO_ENDPOINT
              value: {{ .Values.knowledgeEngine.minio.endpoint }}
            - name: KE_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: MINIO_ROOT_USER
            - name: KE_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: MINIO_ROOT_PASSWORD

            - name: KE_AI_GATEWAY_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: AI_GATEWAY_URL

            - name: KE_DEBUG
              value: {{ .Values.knowledgeEngine.debug }}

            - name: KE_PERMISSIONS__FAIL_CLOSED
              value: {{ .Values.knowledgeEngine.permissions.failClosed }}

            - name: KE_AUTH__ENABLED
              value: {{ .Values.knowledgeEngine.auth.enabled }}
            - name: KE_AUTH__JWKS_URL
              value: {{ .Values.knowledgeEngine.auth.jwksUrl }}
            - name: KE_AUTH__ISSUER
              value: {{ .Values.knowledgeEngine.auth.issuer }}
            - name: KE_AUTH__AUDIENCE
              value: {{ .Values.knowledgeEngine.auth.audience }}

            # Keycloak
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_ISSUER

          resources:
            requests:
              cpu: {{ .Values.knowledgeEngine.resources.requests.cpu }}
              memory: {{ .Values.knowledgeEngine.resources.requests.memory }}
            limits:
              cpu: {{ .Values.knowledgeEngine.resources.limits.cpu }}
              memory: {{ .Values.knowledgeEngine.resources.limits.memory }}

          startupProbe:
            httpGet:
              path: /v1/health/live
              port: {{ .Values.knowledgeEngine.containerPort }}
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /v1/health/live
              port: {{ .Values.knowledgeEngine.containerPort }}
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: {{ .Values.knowledgeEngine.containerPort }}
            periodSeconds: 15
            failureThreshold: 5
