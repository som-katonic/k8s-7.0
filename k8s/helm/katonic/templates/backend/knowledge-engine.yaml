apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.knowledgeEngine.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.knowledgeEngine.name }}
spec:
  replicas: {{ .Values.knowledgeEngine.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.knowledgeEngine.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.knowledgeEngine.name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.knowledgeEngine.name }}
          image: {{ .Values.imageRegistry }}{{ .Values.knowledgeEngine.image.repository }}:{{ .Values.knowledgeEngine.image.tag }}
          imagePullPolicy: {{ .Values.knowledgeEngine.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.knowledgeEngine.containerPort }}
          env:
            - name: KE_AUTH__ENABLED
              value: {{ .Values.knowledgeEngine.auth.enabled | quote }}
            - name: KE_MILVUS__HOST
              value: {{ .Values.knowledgeEngine.milvus.host | quote }}
            - name: KE_MILVUS__PORT
              value: {{ .Values.knowledgeEngine.milvus.port | quote }}
            - name: KE_MINIO__ENDPOINT
              value: {{ .Values.knowledgeEngine.minio.endpoint | quote }}
            - name: KE_DEBUG
              value: {{ .Values.knowledgeEngine.debug | quote }}
            - name: KE_PERMISSIONS__FAIL_CLOSED
              value: {{ .Values.knowledgeEngine.permissions.failClosed | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Values.global.configMap }}
            - secretRef:
                name: {{ .Values.global.secret }}
          resources:
            {{- toYaml .Values.knowledgeEngine.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.knowledgeEngine.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.knowledgeEngine.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.knowledgeEngine.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.knowledgeEngine.name }}
spec:
  selector:
    app: {{ .Values.knowledgeEngine.name }}
  ports:
    - port: {{ .Values.knowledgeEngine.service.port }}
      targetPort: {{ .Values.knowledgeEngine.service.targetPort }}
      protocol: TCP


