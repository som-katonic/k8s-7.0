---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.observability.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.observability.name }}
spec:
  selector:
    app: {{ .Values.observability.name }}
  ports:
    - name: http-api
      port: {{ .Values.observability.service.apiPort }}
      targetPort: {{ .Values.observability.service.apiTargetPort }}
    - name: http-metrics
      port: {{ .Values.observability.service.metricsPort }}
      targetPort: {{ .Values.observability.service.metricsTargetPort }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.observability.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.observability.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.observability.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.observability.name }}
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.observability.name }}
          image: "{{ .Values.observability.image.repository }}:{{ .Values.observability.image.tag }}"
          imagePullPolicy: {{ .Values.observability.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.observability.service.apiTargetPort }}
            - containerPort: {{ .Values.observability.service.metricsTargetPort }}

          env:
            - name: OBS_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: PLATFORM_ENVIRONMENT
            - name: OBS_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: POSTGRES_URL
            - name: OBS_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: REDIS_URL
            - name: OBS_CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: CLICKHOUSE_HOST
            - name: OBS_CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: CLICKHOUSE_PORT
            - name: OBS_CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: CLICKHOUSE_DATABASE
            - name: OBS_LANGFUSE_ENABLED
              value: "{{ .Values.observability.env.langfuseEnabled }}"
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: OTEL_ENABLED
            # -- Keycloak --
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_ISSUER

          resources:
            requests:
              cpu: {{ .Values.observability.resources.requests.cpu }}
              memory: {{ .Values.observability.resources.requests.memory }}
            limits:
              cpu: {{ .Values.observability.resources.limits.cpu }}
              memory: {{ .Values.observability.resources.limits.memory }}

          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.observability.service.apiTargetPort }}
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.observability.service.apiTargetPort }}
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.observability.service.apiTargetPort }}
            periodSeconds: 15
            failureThreshold: 5
