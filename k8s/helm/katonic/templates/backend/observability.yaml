apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.observability.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.observability.name }}
spec:
  replicas: {{ .Values.observability.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.observability.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.observability.name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.observability.name }}
          image: {{ .Values.imageRegistry }}{{ .Values.observability.image.repository }}:{{ .Values.observability.image.tag }}
          imagePullPolicy: {{ .Values.observability.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.observability.service.apiTargetPort }}
            - name: metrics
              containerPort: {{ .Values.observability.service.metricsTargetPort }}
          env:
            - name: LANGFUSE_ENABLED
              value: {{ .Values.observability.env.langfuseEnabled | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Values.global.configMap }}
            - secretRef:
                name: {{ .Values.global.secret }}
          resources:
            {{- toYaml .Values.observability.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.observability.service.apiTargetPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.observability.service.apiTargetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.observability.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.observability.name }}
spec:
  selector:
    app: {{ .Values.observability.name }}
  ports:
    - name: api
      port: {{ .Values.observability.service.apiPort }}
      targetPort: {{ .Values.observability.service.apiTargetPort }}
      protocol: TCP
    - name: metrics
      port: {{ .Values.observability.service.metricsPort }}
      targetPort: {{ .Values.observability.service.metricsTargetPort }}
      protocol: TCP


