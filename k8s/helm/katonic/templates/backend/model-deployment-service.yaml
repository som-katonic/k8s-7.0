apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.modelDeploymentService.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.modelDeploymentService.role.name }}
  namespace: {{ .Values.global.namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.modelDeploymentService.roleBinding.name }}
  namespace: {{ .Values.global.namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.modelDeploymentService.serviceAccount.name }}
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: {{ .Values.modelDeploymentService.role.name }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.modelDeploymentService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.modelDeploymentService.name }}
spec:
  replicas: {{ .Values.modelDeploymentService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.modelDeploymentService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.modelDeploymentService.name }}
    spec:
      serviceAccountName: {{ .Values.modelDeploymentService.serviceAccount.name }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.modelDeploymentService.name }}
          image: {{ .Values.imageRegistry }}{{ .Values.modelDeploymentService.image.repository }}:{{ .Values.modelDeploymentService.image.tag }}
          imagePullPolicy: {{ .Values.modelDeploymentService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.modelDeploymentService.containerPort }}
          env:
            - name: K8S_IN_CLUSTER
              value: {{ .Values.modelDeploymentService.env.k8sInCluster | quote }}
            - name: VLLM_IMAGE
              value: {{ .Values.modelDeploymentService.env.vllmImage | quote }}
            - name: TGI_IMAGE
              value: {{ .Values.modelDeploymentService.env.tgiImage | quote }}
            - name: NIM_IMAGE_PREFIX
              value: {{ .Values.modelDeploymentService.env.nimImagePrefix | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Values.global.configMap }}
            - secretRef:
                name: {{ .Values.global.secret }}
          resources:
            {{- toYaml .Values.modelDeploymentService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.modelDeploymentService.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.modelDeploymentService.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.modelDeploymentService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.modelDeploymentService.name }}
spec:
  selector:
    app: {{ .Values.modelDeploymentService.name }}
  ports:
    - port: {{ .Values.modelDeploymentService.service.port }}
      targetPort: {{ .Values.modelDeploymentService.service.targetPort }}
      protocol: TCP


