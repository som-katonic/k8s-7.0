apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.agentRuntime.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.agentRuntime.name }}
spec:
  replicas: {{ .Values.agentRuntime.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.agentRuntime.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.agentRuntime.name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.agentRuntime.name }}
          image: {{ .Values.imageRegistry }}{{ .Values.agentRuntime.image.repository }}:{{ .Values.agentRuntime.image.tag }}
          imagePullPolicy: {{ .Values.agentRuntime.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.agentRuntime.containerPort }}
          env:
            - name: REDIS_URL
              value: {{ .Values.agentRuntime.redisUrl | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Values.global.configMap }}
            - secretRef:
                name: {{ .Values.global.secret }}
          resources:
            {{- toYaml .Values.agentRuntime.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.agentRuntime.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.agentRuntime.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.agentRuntime.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.agentRuntime.name }}
spec:
  selector:
    app: {{ .Values.agentRuntime.name }}
  ports:
    - port: {{ .Values.agentRuntime.service.port }}
      targetPort: {{ .Values.agentRuntime.service.targetPort }}
      protocol: TCP


