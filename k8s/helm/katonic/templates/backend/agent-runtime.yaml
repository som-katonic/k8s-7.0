---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.agentRuntime.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.agentRuntime.name }}
spec:
  selector:
    app: {{ .Values.agentRuntime.name }}
  ports:
    - name: http-api
      port: {{ .Values.agentRuntime.service.port }}
      targetPort: {{ .Values.agentRuntime.service.targetPort }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.agentRuntime.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.agentRuntime.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.agentRuntime.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.agentRuntime.name }}
    spec:
      enableServiceLinks: false

      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}

      containers:
        - name: {{ .Values.agentRuntime.name }}

          image: "{{ .Values.agentRuntime.image.repository }}:{{ .Values.agentRuntime.image.tag }}"
          imagePullPolicy: {{ .Values.agentRuntime.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.agentRuntime.containerPort }}

          env:
            - name: PLATFORM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: PLATFORM_ENVIRONMENT

            - name: PLATFORM_SERVICE_NAME
              value: "{{ .Values.agentRuntime.name }}"

            - name: AI_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: AI_GATEWAY_URL

            - name: GUARDRAILS_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: GUARDRAILS_URL

            - name: GOVERNANCE_PROXY_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: GOVERNANCE_URL

            - name: KNOWLEDGE_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KNOWLEDGE_ENGINE_URL

            - name: MCP_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: MCP_GATEWAY_URL

            - name: ADMIN_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: ADMIN_API_URL

            - name: REDIS_URL
              value: "{{ .Values.agentRuntime.redisUrl }}"

            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: OTEL_ENABLED

            # Keycloak
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: KEYCLOAK_ISSUER

          resources:
            requests:
              cpu: {{ .Values.agentRuntime.resources.requests.cpu }}
              memory: {{ .Values.agentRuntime.resources.requests.memory }}
            limits:
              cpu: {{ .Values.agentRuntime.resources.limits.cpu }}
              memory: {{ .Values.agentRuntime.resources.limits.memory }}

          startupProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.agentRuntime.containerPort }}
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.agentRuntime.containerPort }}
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.agentRuntime.containerPort }}
            periodSeconds: 15
            failureThreshold: 5
