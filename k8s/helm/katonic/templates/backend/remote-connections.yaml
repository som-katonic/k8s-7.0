apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.remoteConnections.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.remoteConnections.name }}
spec:
  replicas: {{ .Values.remoteConnections.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.remoteConnections.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.remoteConnections.name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: {{ .Values.remoteConnections.name }}
          image: {{ .Values.imageRegistry }}{{ .Values.remoteConnections.image.repository }}:{{ .Values.remoteConnections.image.tag }}
          imagePullPolicy: {{ .Values.remoteConnections.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.remoteConnections.service.targetPort }}
          env:
            - name: RC_DEBUG
              value: {{ .Values.remoteConnections.env.debug | quote }}
            - name: RC_JWT_ALGORITHM
              value: {{ .Values.remoteConnections.env.jwtAlgorithm | quote }}
            - name: RC_DEFAULT_TOOL_TIMEOUT
              value: {{ .Values.remoteConnections.env.defaultToolTimeout | quote }}
            - name: RC_SPEC_FETCH_TIMEOUT
              value: {{ .Values.remoteConnections.env.specFetchTimeout | quote }}
            - name: RC_HEALTH_CHECK_TIMEOUT
              value: {{ .Values.remoteConnections.env.healthCheckTimeout | quote }}
            - name: RC_MCP_SSE_TIMEOUT
              value: {{ .Values.remoteConnections.env.mcpSseTimeout | quote }}
            - name: RC_MCP_SSE_RECONNECT_DELAY
              value: {{ .Values.remoteConnections.env.mcpSseReconnectDelay | quote }}
            - name: RC_HEALTH_CHECK_INTERVAL
              value: {{ .Values.remoteConnections.env.healthCheckInterval | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Values.global.configMap }}
            - secretRef:
                name: {{ .Values.global.secret }}
          resources:
            {{- toYaml .Values.remoteConnections.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.remoteConnections.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.remoteConnections.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.remoteConnections.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.remoteConnections.name }}
spec:
  selector:
    app: {{ .Values.remoteConnections.name }}
  ports:
    - port: {{ .Values.remoteConnections.service.port }}
      targetPort: {{ .Values.remoteConnections.service.targetPort }}
      protocol: TCP


