{{- $ns := .Values.namespace }}

# ── Require valid JWT for all services (except public paths) ──
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: require-jwt
  namespace: {{ $ns }}
spec:
  action: ALLOW
  rules:
    # ── Public endpoints (health, metrics, docs) ──
    - to:
        - operation:
            paths: {{ toYaml .Values.jwtPublicPaths | nindent 14 }}
    # ── Everything else requires valid JWT ──
    - from:
        - source:
            requestPrincipals: ["*"]

{{- range $index, $frontend := .Values.allowAllApps }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-{{ $frontend.name }}
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app: {{ $frontend.app }}
  action: ALLOW
  rules:
    - {}
{{- end }}
