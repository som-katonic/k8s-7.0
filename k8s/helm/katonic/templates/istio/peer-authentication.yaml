{{- range .Values.peerAuth }}
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
spec:
  {{- if .selector }}
  selector:
    matchLabels:
      app: {{ .selector.app }}
  {{- end }}
  mtls:
    mode: {{ .mtlsMode }}
{{- end }}
