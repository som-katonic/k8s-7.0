---
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  selector:
    istio: {{ .Values.gateway.selector }}
  servers:
    {{- range .Values.gateway.servers }}
    - hosts:
        - {{ $.Values.domain }}
      port:
        name: {{ .port.name }}
        number: {{ .port.number }}
        protocol: {{ .port.protocol }}
      {{- if .tls }}
      tls:
        {{- if .tls.httpsRedirect }}
        httpsRedirect: {{ .tls.httpsRedirect }}
        {{- else }}
        mode: {{ .tls.mode }}
        credentialName: {{ .tls.credentialName }}
        minProtocolVersion: {{ .tls.minProtocolVersion }}
        maxProtocolVersion: {{ .tls.maxProtocolVersion }}
        cipherSuites:
          {{- range .tls.cipherSuites }}
          - {{ . }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
