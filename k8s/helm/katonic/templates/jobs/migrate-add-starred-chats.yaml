apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-add-starred-chats
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.image.postgres }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do
                echo "Waiting for PostgreSQL at $POSTGRES_HOST:$POSTGRES_PORT..."
                sleep 3
              done
              echo "PostgreSQL is ready."
          envFrom:
            - configMapRef:
                name: {{ .Values.global.configMap }}
            - secretRef:
                name: {{ .Values.global.secret }}
      containers:
        - name: migrate
          image: {{ .Values.image.postgres }}
          command:
            - sh
            - -c
            - |
              psql "$DATABASE_URL" -c "
                ALTER TABLE chats ADD COLUMN IF NOT EXISTS starred BOOLEAN DEFAULT FALSE;
                CREATE INDEX IF NOT EXISTS idx_chats_starred ON chats(starred) WHERE starred = TRUE;
              "
              echo "Migration complete."
          envFrom:
            - configMapRef:
                name: {{ .Values.global.configMap }}
            - secretRef:
                name: {{ .Values.global.secret }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}


