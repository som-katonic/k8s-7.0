---
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-add-starred-chats
  namespace: {{ .Values.namespace }}
  labels:
    app: migrate-add-starred-chats
    app.kubernetes.io/component: migration
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: migrate-add-starred-chats
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.image.postgres }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h "$PG_HOST" -p "$PG_PORT" -U "$POSTGRES_USER"; do
                echo "  not ready, retry in 3s"; sleep 3
              done
              echo "PostgreSQL ready."
          env:
            - name: PG_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: POSTGRES_HOST
            - name: PG_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: POSTGRES_USER
      containers:
        - name: migrate
          image: {{ .Values.image.postgres }}
          command:
            - sh
            - -c
            - |
              set -e
              echo "=== Migration: add is_starred to assistant_chat_sessions ==="
              psql "postgresql://${PG_USER}:${PG_PASS}@${PG_HOST}:${PG_PORT}/${PG_DB}" <<'SQL'
              ALTER TABLE assistant_chat_sessions
                ADD COLUMN IF NOT EXISTS is_starred BOOLEAN NOT NULL DEFAULT FALSE;
              CREATE INDEX IF NOT EXISTS idx_chat_sessions_starred
                ON assistant_chat_sessions (assistant_chat_id, is_starred DESC, create_time DESC);
              SQL
              echo "=== Migration complete ==="
          env:
            - name: PG_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: POSTGRES_HOST
            - name: PG_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: POSTGRES_PORT
            - name: PG_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.configMap }}
                  key: POSTGRES_DB
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: POSTGRES_USER
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
