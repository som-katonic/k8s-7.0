apiVersion: batch/v1
kind: Job
metadata:
  name: seed-all
  namespace: {{ .Values.namespace }}
  labels:
    app: seed-all
    app.kubernetes.io/component: seed
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: seed-all
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ . }}
{{- end }}

      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.image.postgres }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at ${PG_HOST}:${PG_PORT}..."
              until pg_isready -h "$PG_HOST" -p "$PG_PORT" -U "$POSTGRES_USER"; do
                echo "  PostgreSQL not ready — retrying in 3s"
                sleep 3
              done
              echo "PostgreSQL is ready!"
          env:
            - name: PG_HOST
              value: {{ .Values.postgres.host }}
            - name: PG_PORT
              value: "{{ .Values.postgres.port }}"
            - name: PG_USER
              value: {{ .Values.postgres.user }}

      containers:
        - name: seed-all
          image: {{ .Values.image.seedAll }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PG_HOST
              value: {{ .Values.postgres.host }}
            - name: PG_PORT
              value: "{{ .Values.postgres.port }}"
            - name: PG_ADMIN_USER
              value: {{ .Values.postgres.user }}
            - name: PG_ADMIN_PASS
              value: {{ .Values.postgres.password }}
            - name: PLATFORM_DB_USER
              value: {{ .Values.platform.db.user }}
            - name: PLATFORM_DB_PASS
              value: {{ .Values.platform.db.password }}
            - name: PLATFORM_DB_NAME
              value: {{ .Values.platform.db.name }}
            - name: MILVUS_URI
              value: {{ .Values.milvus.uri }}
            - name: TENANT_ID
              value: {{ .Values.tenantId }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
