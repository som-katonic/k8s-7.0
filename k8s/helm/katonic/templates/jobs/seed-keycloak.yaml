---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-keycloak
  namespace: {{ .Values.namespace }}
  labels:
    app: seed-keycloak
spec:
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.job.backoffLimit }}
  template:
    metadata:
      labels:
        app: seed-keycloak
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      initContainers:
        - name: wait-for-keycloak
          image: {{ .Values.image.waitCurl }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak..."
              until curl -sf http://keycloak:9000/auth/health/ready; do
                echo "  not ready, retry in 5s"; sleep 5
              done
              echo "Keycloak ready."
      containers:
        - name: seed
          image: {{ .Values.image.seed }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - pip install -q "python-keycloak>=4.0.0" && python /scripts/seed_keycloak.py
          env:
            - name: KEYCLOAK_URL
              value: {{ .Values.keycloak.url }}
            - name: PLATFORM_DOMAIN
              value: {{ .Values.domain }}
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: {{ .Values.keycloak.adminUserSecret }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: {{ .Values.keycloak.adminPassSecret }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: {{ .Values.keycloak.clientSecretSecret }}
            - name: ADMIN_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: KATONIC_ADMIN_EMAIL
            - name: ADMIN_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secret }}
                  key: KATONIC_ADMIN_PASSWORD
            - name: ADMIN_FIRST_NAME
              value: {{ .Values.superAdmin.firstName }}
            - name: ADMIN_LAST_NAME
              value: {{ .Values.superAdmin.lastName }}
            - name: ADMIN_TENANT_ID
              value: {{ .Values.superAdmin.tenantId }}
            - name: ADMIN_TEAMS
              value: {{ .Values.superAdmin.teams }}
            - name: ADMIN_DEPARTMENT
              value: {{ .Values.superAdmin.department }}
            - name: ADMIN_ROLE
              value: {{ .Values.superAdmin.role }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          volumeMounts:
            - name: seed-script
              mountPath: /scripts
      volumes:
        - name: seed-script
          configMap:
            name: seed-keycloak-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seed-keycloak-script
  namespace: {{ .Values.namespace }}
data:
  seed_keycloak.py: |
    """
    Keycloak realm seed for Katonic 7.0.
    Idempotent — safe to re-run.
    Creates: platform realm, PKCE public client, confidential API client,
             protocol mappers, realm roles, and the platform super admin user.
    """
    import os, sys
    from keycloak import KeycloakAdmin, KeycloakOpenIDConnection

    KC_URL         = os.environ["KEYCLOAK_URL"]
    KC_ADMIN       = os.environ["KEYCLOAK_ADMIN_USER"]
    KC_PASS        = os.environ["KEYCLOAK_ADMIN_PASSWORD"]
    CLIENT_SECRET  = os.environ["KEYCLOAK_CLIENT_SECRET"]
    DOMAIN         = os.environ["PLATFORM_DOMAIN"]
    ADMIN_EMAIL    = os.environ["ADMIN_USER_EMAIL"]
    ADMIN_PASSWORD = os.environ["ADMIN_USER_PASSWORD"]
    ADMIN_FIRST    = os.environ.get("ADMIN_FIRST_NAME", "Platform")
    ADMIN_LAST     = os.environ.get("ADMIN_LAST_NAME",  "Admin")
    ADMIN_TENANT   = os.environ.get("ADMIN_TENANT_ID",  "default")
    ADMIN_TEAMS    = os.environ.get("ADMIN_TEAMS",       "platform").split(",")
    ADMIN_DEPT     = os.environ.get("ADMIN_DEPARTMENT",  "Engineering")
    ADMIN_ROLE     = os.environ.get("ADMIN_ROLE",        "platform_admin")

    REALM               = "platform"
    PUBLIC_CLIENT       = "platform-ui"
    CONFIDENTIAL_CLIENT = "platform-api"
    ROLES = ["platform_admin", "team_admin", "developer", "viewer"]
    REDIRECT_URIS = [f"https://{DOMAIN}/*", "http://localhost:3000/*", "http://localhost:5173/*"]
    WEB_ORIGINS   = [f"https://{DOMAIN}", "http://localhost:3000", "http://localhost:5173"]

    def safe(fn, *a, **kw):
        try:
            return fn(*a, **kw)
        except Exception as e:
            if "already exists" in str(e).lower() or "409" in str(e):
                return None
            raise

    def main():
        print(f"Connecting to Keycloak at {KC_URL}...")
        conn = KeycloakOpenIDConnection(server_url=KC_URL, username=KC_ADMIN,
                                        password=KC_PASS, realm_name="master", verify=True)
        adm = KeycloakAdmin(connection=conn)

        if REALM not in [r["realm"] for r in adm.get_realms()]:
            print(f"Creating realm '{REALM}'...")
            adm.create_realm(payload={
                "realm": REALM, "enabled": True, "displayName": "Katonic Platform",
                "accessTokenLifespan": 300, "ssoSessionIdleTimeout": 1800,
                "ssoSessionMaxLifespan": 36000, "registrationAllowed": False,
                "resetPasswordAllowed": True, "loginWithEmailAllowed": True,
                "duplicateEmailsAllowed": False,
            }, skip_exists=True)
        else:
            print(f"Realm '{REALM}' exists.")

        adm.change_current_realm(REALM)

        for role in ROLES:
            safe(adm.create_realm_role,
                 payload={"name": role, "description": f"Platform role: {role}"},
                 skip_exists=True)
            print(f"  Role '{role}' ready.")

        safe(adm.create_client, payload={
            "clientId": PUBLIC_CLIENT, "name": "Katonic Platform UI",
            "enabled": True, "publicClient": True, "standardFlowEnabled": True,
            "directAccessGrantsEnabled": False,
            "redirectUris": REDIRECT_URIS, "webOrigins": WEB_ORIGINS,
            "attributes": {"pkce.code.challenge.method": "S256", "post.logout.redirect.uris": "+"},
            "protocol": "openid-connect", "fullScopeAllowed": True,
        }, skip_exists=True)
        print(f"  Client '{PUBLIC_CLIENT}' ready.")

        safe(adm.create_client, payload={
            "clientId": CONFIDENTIAL_CLIENT, "name": "Katonic Platform API",
            "enabled": True, "publicClient": False, "standardFlowEnabled": False,
            "serviceAccountsEnabled": True, "directAccessGrantsEnabled": False,
            "secret": CLIENT_SECRET, "protocol": "openid-connect", "fullScopeAllowed": True,
        }, skip_exists=True)
        print(f"  Client '{CONFIDENTIAL_CLIENT}' ready.")

        mappers = [
            {"name": "tenant_id",  "attr": "tenant_id",  "multi": "false"},
            {"name": "teams",      "attr": "teams",      "multi": "true", "agg": "true"},
            {"name": "department", "attr": "department", "multi": "false"},
        ]
        for cid_str in [PUBLIC_CLIENT, CONFIDENTIAL_CLIENT]:
            cid = adm.get_client_id(cid_str)
            for m in mappers:
                cfg = {"user.attribute": m["attr"], "claim.name": m["name"],
                       "jsonType.label": "String", "id.token.claim": "true",
                       "access.token.claim": "true", "userinfo.token.claim": "true",
                       "multivalued": m["multi"]}
                if "agg" in m:
                    cfg["aggregate.attrs"] = m["agg"]
                safe(adm.add_mapper_to_client, cid, {
                    "name": m["name"], "protocol": "openid-connect",
                    "protocolMapper": "oidc-usermodel-attribute-mapper", "config": cfg,
                })
            print(f"  Mappers ready for '{cid_str}'.")

        print(f"\nCreating super admin: {ADMIN_EMAIL}...")
        safe(adm.create_user, payload={
            "username": ADMIN_EMAIL, "email": ADMIN_EMAIL,
            "firstName": ADMIN_FIRST, "lastName": ADMIN_LAST,
            "enabled": True, "emailVerified": True,
            "credentials": [{"type": "password", "value": ADMIN_PASSWORD, "temporary": False}],
            "attributes": {"tenant_id": [ADMIN_TENANT], "teams": ADMIN_TEAMS, "department": [ADMIN_DEPT]},
        }, exist_ok=True)
        uid = adm.get_user_id(ADMIN_EMAIL)
        role_obj = adm.get_realm_role(ADMIN_ROLE)
        safe(adm.assign_realm_roles, user_id=uid, roles=[role_obj])
        print(f"  Super admin '{ADMIN_EMAIL}' ready with role '{ADMIN_ROLE}'.")

        print("\n=== Keycloak seed complete ===")
        print(f"  Platform URL:  https://{DOMAIN}")
        print(f"  Keycloak:      https://{DOMAIN}/auth/admin")
        print(f"  Realm:         {REALM}")
        print(f"  Issuer:        https://{DOMAIN}/auth/realms/{REALM}")
        print(f"  Admin login:   {ADMIN_EMAIL}")

    if __name__ == "__main__":
        try:
            main()
        except Exception as e:
            print(f"ERROR: {e}", file=sys.stderr)
            sys.exit(1)
