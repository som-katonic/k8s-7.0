---
apiVersion: v1
kind: Service
metadata:
  name: katonic-frontend
  namespace: katonic
  labels:
    app: katonic-frontend
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: katonic-platform
spec:
  type: ClusterIP
  selector:
    app: katonic-frontend
  ports:
    - name: http-web
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: katonic-frontend
  namespace: katonic
  labels:
    app: katonic-frontend
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: katonic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katonic-frontend
  template:
    metadata:
      labels:
        app: katonic-frontend
    spec:
      enableServiceLinks: false
      containers:
        - name: katonic-frontend
          image: katonic.azurecr.io/katonic-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
