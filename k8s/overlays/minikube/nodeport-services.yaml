---
apiVersion: v1
kind: Service
metadata:
  name: katonic-frontend-nodeport
  namespace: katonic
spec:
  type: NodePort
  selector:
    app: katonic-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api-nodeport
  namespace: katonic
spec:
  type: NodePort
  selector:
    app: admin-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30004
---
apiVersion: v1
kind: Service
metadata:
  name: platform-backend-nodeport
  namespace: katonic
spec:
  type: NodePort
  selector:
    app: platform-backend
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002
