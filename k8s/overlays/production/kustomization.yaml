apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: katonic

resources:
  - ../../base

patches:
  # ── Set environment to production ──
  - target:
      kind: ConfigMap
      name: platform-config
    patch: |
      - op: replace
        path: /data/PLATFORM_ENVIRONMENT
        value: "production"

  # ── Remove imagePullSecrets (ACR uses managed identity, not pull secrets) ──
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []

  # ── Set imagePullPolicy to Always (mutable tags like :main, :latest) ──
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: "Always"

  # ── High Availability: scale critical services to 2 replicas ──
  # Currently single-replica to save cost on 1-node cluster.
  # Uncomment below when ready to scale up for zero-downtime HA.
  # - target:
  #     kind: Deployment
  #     name: katonic-frontend
  #   patch: |
  #     - op: replace
  #       path: /spec/replicas
  #       value: 2
  # - target:
  #     kind: Deployment
  #     name: platform-backend
  #   patch: |
  #     - op: replace
  #       path: /spec/replicas
  #       value: 2
  # - target:
  #     kind: Deployment
  #     name: admin-api
  #   patch: |
  #     - op: replace
  #       path: /spec/replicas
  #       value: 2
  # - target:
  #     kind: Deployment
  #     name: ai-gateway
  #   patch: |
  #     - op: replace
  #       path: /spec/replicas
  #       value: 2
  # - target:
  #     kind: Deployment
  #     name: agent-api
  #   patch: |
  #     - op: replace
  #       path: /spec/replicas
  #       value: 2
  # - target:
  #     kind: Deployment
  #     name: agent-runtime
  #   patch: |
  #     - op: replace
  #       path: /spec/replicas
  #       value: 2

  # ── katonic-frontend: Expose via LoadBalancer on port 80 ──
  # Point preview.katonic.ai DNS A record to the LoadBalancer IP
  - target:
      kind: Service
      name: katonic-frontend
    patch: |
      - op: add
        path: /spec/type
        value: "LoadBalancer"
      - op: replace
        path: /spec/ports/0/port
        value: 80

# CD workflow fills this dynamically via `kustomize edit set image`
# Maps katonic/<svc>:latest → katonic.azurecr.io/<svc>:<tag>
images:
  - name: katonic/admin-api
    newName: katonic.azurecr.io/admin-api
    newTag: latest
  - name: katonic/observability
    newName: katonic.azurecr.io/observability
    newTag: latest
  - name: katonic/guardrails-engine
    newName: katonic.azurecr.io/guardrails-engine
    newTag: latest
  - name: katonic/governance-proxy
    newName: katonic.azurecr.io/governance-proxy
    newTag: latest
  - name: katonic/agent-api
    newName: katonic.azurecr.io/agent-api
    newTag: latest
  - name: katonic/agent-runtime
    newName: katonic.azurecr.io/agent-runtime
    newTag: latest
  - name: katonic/mcp-gateway
    newName: katonic.azurecr.io/mcp-gateway
    newTag: latest
  - name: katonic/ai-gateway
    newName: katonic.azurecr.io/ai-gateway
    newTag: latest
  - name: katonic/seed-all
    newName: katonic.azurecr.io/seed-all
    newTag: latest
  - name: katonic/knowledge-engine
    newName: katonic.azurecr.io/knowledge-engine
    newTag: latest
  - name: katonic/model-deployment-service
    newName: katonic.azurecr.io/model-deployment-service
    newTag: latest
  - name: katonic/workspace-service
    newName: katonic.azurecr.io/workspace-service
    newTag: latest
  - name: katonic/remote-connections
    newName: katonic.azurecr.io/remote-connections
    newTag: latest
  - name: katonic/platform-backend
    newName: katonic.azurecr.io/platform-backend
    newTag: latest
  - name: katonic/eval-engine
    newName: katonic.azurecr.io/eval-engine
    newTag: latest
  - name: katonic/katonic-frontend
    newName: katonic.azurecr.io/katonic-frontend
    newTag: latest
