apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: katonic-dev

resources:
  - ../../base

patches:
  # ── Set environment to development ──
  # NOTE: Pydantic Settings expects: 'development', 'staging', or 'production'
  - target:
      kind: ConfigMap
      name: platform-config
    patch: |
      - op: replace
        path: /data/PLATFORM_ENVIRONMENT
        value: "development"

  # ── Remove imagePullSecrets (ACR uses managed identity) ──
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []

  # ── Set imagePullPolicy to Always (mutable tags like :dev, :latest) ──
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: "Always"

  # ── Disable Istio sidecar injection for dev (simplify debugging) ──
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/metadata/labels/sidecar.istio.io~1inject
        value: "false"

  # ── Disable Istio sidecar for StatefulSets (postgres, redis, etc.) ──
  - target:
      kind: StatefulSet
    patch: |
      - op: add
        path: /spec/template/metadata/labels/sidecar.istio.io~1inject
        value: "false"

  # NOTE: Jobs already have sidecar.istio.io/inject: "false" in base manifests.
  # Cannot patch Jobs here because Kubernetes Job spec.template is immutable.

  # ── katonic-frontend: Set SERVICE_NAMESPACE for nginx upstream FQDNs ──
  - target:
      kind: Deployment
      name: katonic-frontend
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: SERVICE_NAMESPACE
            value: "katonic-dev"

  # ── katonic-frontend: Expose via LoadBalancer on port 80 ──
  - target:
      kind: Service
      name: katonic-frontend
    patch: |
      - op: add
        path: /spec/type
        value: "LoadBalancer"
      - op: replace
        path: /spec/ports/0/port
        value: 80

# CD workflow fills this dynamically via `kustomize edit set image`
# Maps katonic/<svc>:latest → katonic.azurecr.io/dev/<svc>:<tag>
# Dev images use dev/ prefix to separate from stage/production images
images:
  - name: katonic/admin-api
    newName: katonic.azurecr.io/dev/admin-api
    newTag: latest
  - name: katonic/observability
    newName: katonic.azurecr.io/dev/observability
    newTag: latest
  - name: katonic/guardrails-engine
    newName: katonic.azurecr.io/dev/guardrails-engine
    newTag: latest
  - name: katonic/governance-proxy
    newName: katonic.azurecr.io/dev/governance-proxy
    newTag: latest
  - name: katonic/agent-api
    newName: katonic.azurecr.io/dev/agent-api
    newTag: latest
  - name: katonic/agent-runtime
    newName: katonic.azurecr.io/dev/agent-runtime
    newTag: latest
  - name: katonic/mcp-gateway
    newName: katonic.azurecr.io/dev/mcp-gateway
    newTag: latest
  - name: katonic/ai-gateway
    newName: katonic.azurecr.io/dev/ai-gateway
    newTag: latest
  - name: katonic/seed-all
    newName: katonic.azurecr.io/dev/seed-all
    newTag: latest
  - name: katonic/knowledge-engine
    newName: katonic.azurecr.io/dev/knowledge-engine
    newTag: latest
  - name: katonic/model-deployment-service
    newName: katonic.azurecr.io/dev/model-deployment-service
    newTag: latest
  - name: katonic/workspace-service
    newName: katonic.azurecr.io/dev/workspace-service
    newTag: latest
  - name: katonic/remote-connections
    newName: katonic.azurecr.io/dev/remote-connections
    newTag: latest
  - name: katonic/platform-backend
    newName: katonic.azurecr.io/dev/platform-backend
    newTag: latest
  - name: katonic/eval-engine
    newName: katonic.azurecr.io/dev/eval-engine
    newTag: latest
  - name: katonic/katonic-frontend
    newName: katonic.azurecr.io/dev/katonic-frontend
    newTag: latest
