---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workspace-sa
  namespace: katonic
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workspace-role
  namespace: katonic
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods", "services", "deployments", "persistentvolumeclaims", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workspace-rb
  namespace: katonic
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workspace-role
subjects:
  - kind: ServiceAccount
    name: workspace-sa
    namespace: katonic
---
apiVersion: v1
kind: Service
metadata:
  name: workspace-service
  namespace: katonic
spec:
  selector:
    app: workspace-service
  ports:
    - name: http-api
      port: 8013
      targetPort: 8013
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-service
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workspace-service
  template:
    metadata:
      labels:
        app: workspace-service
    spec:
      enableServiceLinks: false
      serviceAccountName: workspace-sa
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: workspace-service
          image: katonic/workspace-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8013
          env:
            - name: WS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_URL
            - name: WS_K8S_IN_CLUSTER
              value: "true"
            - name: WS_K8S_NAMESPACE
              value: "katonic"
            - name: WS_ORG_NAME
              value: "katonic"
            - name: WS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: JWT_SECRET
            - name: WS_NFS_STORAGE_CLASS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: NFS_STORAGE_CLASS
            - name: WS_NFS_DEFAULT_SIZE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: NFS_DEFAULT_SIZE
            - name: WS_MODEL_CACHE_PVC
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MODEL_CACHE_PVC
            - name: PLATFORM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            # -- Keycloak --
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: KEYCLOAK_CLIENT_SECRET
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8013
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8013
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8013
            periodSeconds: 15
            failureThreshold: 5
