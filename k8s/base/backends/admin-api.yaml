---
apiVersion: v1
kind: Service
metadata:
  name: admin-api
  namespace: katonic
spec:
  selector:
    app: admin-api
  ports:
    - name: http-api
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-api
  template:
    metadata:
      labels:
        app: admin-api
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: admin-api
          image: katonic/admin-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ADMIN_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            - name: ADMIN_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_URL
            - name: ADMIN_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: REDIS_URL
            - name: ADMIN_AI_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AI_GATEWAY_URL
            - name: ADMIN_GUARDRAILS_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GUARDRAILS_URL
            - name: ADMIN_GOVERNANCE_PROXY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GOVERNANCE_URL
            - name: ADMIN_KNOWLEDGE_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KNOWLEDGE_ENGINE_URL
            - name: ADMIN_MCP_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MCP_GATEWAY_URL
            - name: ADMIN_MODEL_SERVING_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MODEL_DEPLOY_URL
            - name: ADMIN_MARKETPLACE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MARKETPLACE_URL
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: OTEL_ENABLED
            # -- Keycloak --
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /v1/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            periodSeconds: 15
            failureThreshold: 5
