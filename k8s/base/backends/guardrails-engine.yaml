---
apiVersion: v1
kind: Service
metadata:
  name: guardrails-engine
  namespace: katonic
spec:
  selector:
    app: guardrails-engine
  ports:
    - name: http-api
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrails-engine
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guardrails-engine
  template:
    metadata:
      labels:
        app: guardrails-engine
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: guardrails-engine
          image: katonic/guardrails-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PLATFORM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            - name: PLATFORM_SERVICE_NAME
              value: "guardrails-engine"
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_HOST
            - name: CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_PORT
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_DATABASE
            - name: AI_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AI_GATEWAY_URL
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: OTEL_ENABLED
            # -- Keycloak --
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
