---
apiVersion: v1
kind: Service
metadata:
  name: observability
  namespace: katonic
spec:
  selector:
    app: observability
  ports:
    - name: http-api
      port: 8000
      targetPort: 8000
    - name: http-metrics
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability
  template:
    metadata:
      labels:
        app: observability
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: observability
          image: katonic/observability:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
            - containerPort: 9090
          env:
            - name: OBS_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            - name: OBS_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_URL
            - name: OBS_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: REDIS_URL
            - name: OBS_CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_HOST
            - name: OBS_CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_PORT
            - name: OBS_CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_DATABASE
            - name: OBS_LANGFUSE_ENABLED
              value: "false"
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: OTEL_ENABLED
            # -- Keycloak --
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 15
            failureThreshold: 5
