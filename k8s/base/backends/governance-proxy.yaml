---
apiVersion: v1
kind: Service
metadata:
  name: governance-proxy
  namespace: katonic
spec:
  selector:
    app: governance-proxy
  ports:
    - name: http-api
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-proxy
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: governance-proxy
  template:
    metadata:
      labels:
        app: governance-proxy
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: governance-proxy
          image: katonic/governance-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: GP_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            - name: GP_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_URL
            - name: GP_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: REDIS_URL
            - name: GP_CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_HOST
            - name: GP_CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_PORT
            - name: GP_CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_DATABASE
            - name: GP_AI_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AI_GATEWAY_URL
            - name: GP_MCP_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MCP_GATEWAY_URL
            - name: GP_REMOTE_CONNECTIONS_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: REMOTE_CONNECTIONS_URL
            - name: GP_KNOWLEDGE_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KNOWLEDGE_ENGINE_URL
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: OTEL_ENABLED
            # -- Keycloak --
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
