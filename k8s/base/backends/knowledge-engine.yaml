---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-engine
  namespace: katonic
spec:
  selector:
    app: knowledge-engine
  ports:
    - name: http-api
      port: 8011
      targetPort: 8011
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-engine
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-engine
  template:
    metadata:
      labels:
        app: knowledge-engine
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: knowledge-engine
          image: katonic/knowledge-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8011
          env:
            - name: KE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            - name: KE_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: KE_POSTGRES_DSN
            - name: KE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: KE_REDIS_URL
            # Milvus (settings: milvus_host, milvus_port)
            - name: KE_MILVUS_HOST
              value: "milvus"
            - name: KE_MILVUS_PORT
              value: "19530"
            # MinIO object storage (settings: minio_endpoint, minio_access_key, minio_secret_key)
            - name: KE_MINIO_ENDPOINT
              value: "minio:9000"
            - name: KE_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: MINIO_ROOT_USER
            - name: KE_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: MINIO_ROOT_PASSWORD
            - name: KE_AI_GATEWAY_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AI_GATEWAY_URL
            - name: KE_DEBUG
              value: "true"
            # Fail-open permissions: SpiceDB not deployed, so allow
            # unfiltered search results instead of returning empty.
            - name: KE_PERMISSIONS__FAIL_CLOSED
              value: "false"
            # -- Keycloak auth --
            - name: KE_AUTH__ENABLED
              value: "true"
            - name: KE_AUTH__JWKS_URL
              value: "http://keycloak:8080/auth/realms/platform/protocol/openid-connect/certs"
            - name: KE_AUTH__ISSUER
              value: "https://preview.katonic.ai/auth/realms/platform"
            - name: KE_AUTH__AUDIENCE
              value: "platform-api"
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /v1/health/live
              port: 8011
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /v1/health/live
              port: 8011
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8011
            periodSeconds: 15
            failureThreshold: 5
