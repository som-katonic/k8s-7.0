---
apiVersion: v1
kind: Service
metadata:
  name: remote-connections
  namespace: katonic
spec:
  selector:
    app: remote-connections
  ports:
    - name: http-api
      port: 8014
      targetPort: 8014
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: remote-connections
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remote-connections
  template:
    metadata:
      labels:
        app: remote-connections
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: remote-connections
          image: katonic/remote-connections:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8014
          env:
            - name: RC_DEBUG
              value: "false"
            - name: RC_PORT
              value: "8014"
            - name: RC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_URL
            - name: RC_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: RC_ENCRYPTION_KEY
            - name: RC_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: JWT_SECRET
            - name: RC_JWT_ALGORITHM
              value: "HS256"
            - name: RC_DEFAULT_TOOL_TIMEOUT
              value: "30.0"
            - name: RC_SPEC_FETCH_TIMEOUT
              value: "15.0"
            - name: RC_HEALTH_CHECK_TIMEOUT
              value: "10.0"
            - name: RC_MCP_SSE_TIMEOUT
              value: "60.0"
            - name: RC_MCP_SSE_RECONNECT_DELAY
              value: "5.0"
            - name: RC_HEALTH_CHECK_INTERVAL_SECONDS
              value: "300"
            - name: PLATFORM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            # -- Keycloak --
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8014
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8014
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8014
            periodSeconds: 15
            failureThreshold: 5
