---
apiVersion: v1
kind: Service
metadata:
  name: eval-engine
  namespace: katonic
spec:
  selector:
    app: eval-engine
  ports:
    - name: http-api
      port: 8015
      targetPort: 8015
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eval-engine
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eval-engine
  template:
    metadata:
      labels:
        app: eval-engine
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: eval-engine
          image: katonic/eval-engine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8015
          env:
            - name: AGENT_API_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AGENT_API_URL
            - name: AI_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AI_GATEWAY_URL
            - name: PLATFORM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            # -- Keycloak --
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8015
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8015
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8015
            periodSeconds: 15
            failureThreshold: 5
