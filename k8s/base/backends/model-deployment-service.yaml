---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-deployment-sa
  namespace: katonic
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-deployment-role
  namespace: katonic
rules:
  - apiGroups: ["", "apps", "batch"]
    resources: ["pods", "services", "deployments", "jobs", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-deployment-rb
  namespace: katonic
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-deployment-role
subjects:
  - kind: ServiceAccount
    name: model-deployment-sa
    namespace: katonic
---
apiVersion: v1
kind: Service
metadata:
  name: model-deployment-service
  namespace: katonic
spec:
  selector:
    app: model-deployment-service
  ports:
    - name: http-api
      port: 8012
      targetPort: 8012
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-deployment-service
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-deployment-service
  template:
    metadata:
      labels:
        app: model-deployment-service
    spec:
      enableServiceLinks: false
      serviceAccountName: model-deployment-sa
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: model-deployment-service
          image: katonic/model-deployment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8012
          env:
            - name: MDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_URL
            - name: MDS_K8S_IN_CLUSTER
              value: "true"
            - name: MDS_K8S_NAMESPACE
              value: "katonic"
            - name: MDS_VLLM_IMAGE
              value: "vllm/vllm-openai:latest"
            - name: MDS_TGI_IMAGE
              value: "ghcr.io/huggingface/text-generation-inference:latest"
            - name: MDS_NIM_IMAGE_PREFIX
              value: "nvcr.io/nim"
            - name: MDS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: JWT_SECRET
            - name: MDS_MODEL_CACHE_PVC
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MODEL_CACHE_PVC
            - name: PLATFORM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            # -- Keycloak --
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: KEYCLOAK_CLIENT_SECRET
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8012
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8012
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8012
            periodSeconds: 15
            failureThreshold: 5
