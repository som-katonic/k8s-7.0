---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: katonic
spec:
  selector:
    app: ai-gateway
  ports:
    - name: http-api
      port: 8010
      targetPort: 8010
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-gateway
  template:
    metadata:
      labels:
        app: ai-gateway
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: ai-gateway
          image: katonic/ai-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8010
          env:
            - name: GATEWAY_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
            - name: GATEWAY_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_URL
            - name: GATEWAY_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: REDIS_URL
            - name: GATEWAY_CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_HOST
            - name: GATEWAY_CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_PORT
            - name: GATEWAY_CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: CLICKHOUSE_USER
            - name: GATEWAY_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: CLICKHOUSE_PASSWORD
            - name: GATEWAY_CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CLICKHOUSE_DATABASE
            - name: GATEWAY_FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: GATEWAY_FERNET_KEY
            # -- Keycloak --
            - name: KEYCLOAK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_SERVER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KEYCLOAK_ISSUER
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8010
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8010
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8010
            periodSeconds: 15
            failureThreshold: 5
