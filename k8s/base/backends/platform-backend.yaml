---
apiVersion: v1
kind: Service
metadata:
  name: platform-backend
  namespace: katonic
spec:
  selector:
    app: platform-backend
  ports:
    - name: http-api
      port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-backend
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-backend
  template:
    metadata:
      labels:
        app: platform-backend
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: platform-backend
          image: katonic/platform-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: DATABASE_URL
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: REDIS_PORT
            - name: ADMIN_API_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ADMIN_API_URL
            - name: OBSERVABILITY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: OBSERVABILITY_URL
            - name: GUARDRAILS_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GUARDRAILS_URL
            - name: GOVERNANCE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GOVERNANCE_URL
            - name: ASSISTANT_API
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AGENT_API_URL
            - name: ADK_AGENT_API
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AGENT_RUNTIME_URL
            - name: MCP_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MCP_GATEWAY_URL
            - name: AI_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AI_GATEWAY_URL
            - name: KNOWLEDGE_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KNOWLEDGE_ENGINE_URL
            - name: MODEL_DEPLOY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MODEL_DEPLOY_URL
            - name: WORKSPACE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: WORKSPACE_SERVICE_URL
            - name: REMOTE_CONNECTIONS_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: REMOTE_CONNECTIONS_URL
            - name: EXTRACT_API_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GOVERNANCE_URL
            - name: PLATFORM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_ENVIRONMENT
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /platform/api/health
              port: 3002
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /platform/api/health
              port: 3002
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /platform/api/health
              port: 3002
            periodSeconds: 15
            failureThreshold: 5
