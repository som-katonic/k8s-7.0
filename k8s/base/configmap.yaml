apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: katonic
data:
  # ── Environment ──
  PLATFORM_ENVIRONMENT: "production"
  OTEL_ENABLED: "false"

  # ── PostgreSQL ──
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "platform"

  # ── Redis ──
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # ── ClickHouse ──
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DATABASE: "platform"

  # ── Internal Service URLs ──
  ADMIN_API_URL: "http://admin-api:8000"
  OBSERVABILITY_URL: "http://observability:8000"
  GUARDRAILS_URL: "http://guardrails-engine:8000"
  GOVERNANCE_URL: "http://governance-proxy:8000"
  AGENT_API_URL: "http://agent-api:8000"
  AGENT_RUNTIME_URL: "http://agent-runtime:8000"
  MCP_GATEWAY_URL: "http://mcp-gateway:8009"
  AI_GATEWAY_URL: "http://ai-gateway:8010"
  KNOWLEDGE_ENGINE_URL: "http://knowledge-engine:8011"
  MODEL_DEPLOY_URL: "http://model-deployment-service:8012"
  WORKSPACE_SERVICE_URL: "http://workspace-service:8013"
  REMOTE_CONNECTIONS_URL: "http://remote-connections:8014"
  PLATFORM_BACKEND_URL: "http://platform-backend:3002"
  MARKETPLACE_URL: "http://admin-api:8000"
  EVAL_ENGINE_URL: "http://eval-engine:8015"

  # ── NFS Storage ──
  NFS_STORAGE_CLASS: "azurefile-nfs"
  NFS_DEFAULT_SIZE: "10Gi"
  MODEL_CACHE_PVC: "model-cache"

  # ── Keycloak ──
  KEYCLOAK_SERVER_URL: "http://keycloak:8080/auth"
  KEYCLOAK_REALM: "platform"
  KEYCLOAK_AUDIENCE: "account,platform-api,platform-ui"
  KEYCLOAK_ISSUER: "https://preview.katonic.ai/auth/realms/platform"

  # ── Optional: Milvus ──
  MILVUS_URI: "http://milvus:19530"
  MINIO_ENDPOINT: "http://minio:9000"
