---
apiVersion: v1
kind: Service
metadata:
  name: katonic-frontend
  namespace: katonic
spec:
  selector:
    app: katonic-frontend
  ports:
    - name: http-web
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: katonic-frontend
  namespace: katonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katonic-frontend
  template:
    metadata:
      labels:
        app: katonic-frontend
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: katonic-frontend
          image: katonic/katonic-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 15
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
