# ── Keycloak Identity Provider ──
# Quarkus-based Keycloak 26.x using the existing PostgreSQL for storage.
# Creates its own 'keycloak' database on first boot.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: katonic
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args:
            - start
            - --db=postgres
            - --db-url-host=$(POSTGRES_HOST)
            - --db-url-port=$(POSTGRES_PORT)
            - --db-url-database=keycloak
            - --db-username=$(POSTGRES_USER)
            - --db-password=$(POSTGRES_PASSWORD)
            - --hostname=https://preview.katonic.ai/auth
            - --hostname-strict=false
            - --http-enabled=true
            - --http-relative-path=/auth
            - --proxy-headers=xforwarded
            - --health-enabled=true
            - --metrics-enabled=true
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: POSTGRES_PASSWORD
            - name: KC_DB_SCHEMA
              value: "public"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /auth/health/started
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: katonic
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: management
      port: 9000
      targetPort: 9000
      protocol: TCP
  type: ClusterIP
