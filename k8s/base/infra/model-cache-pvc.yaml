---
# Shared NFS volume for cached model weights.
# LLM serving pods mount this ReadOnly; fine-tune jobs mount ReadWrite.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache
  namespace: katonic
  labels:
    app.kubernetes.io/part-of: katonic-platform
    platform-component: model-cache
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile-nfs
  resources:
    requests:
      storage: 50Gi
