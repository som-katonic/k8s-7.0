# ── PodDisruptionBudgets ──
# Ensure minimum availability during voluntary disruptions
# (node drains, cluster upgrades, kubectl evictions)

# ── Critical: user-facing entry points ──
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: katonic-frontend-pdb
  namespace: katonic
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: katonic-frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-backend-pdb
  namespace: katonic
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: platform-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-api-pdb
  namespace: katonic
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin-api

