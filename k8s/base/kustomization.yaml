apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: katonic

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: katonic-platform

resources:
  # ── Namespace & shared config ──
  - namespace.yaml
  - configmap.yaml
  - secret.yaml

  # ── Infrastructure ──
  - infra/postgres.yaml
  - infra/redis.yaml
  - infra/clickhouse.yaml
  - infra/keycloak.yaml
  - infra/nfs-storageclass.yaml
  - infra/model-cache-pvc.yaml

  # ── Backend services (13) ──
  - backends/admin-api.yaml
  - backends/observability.yaml
  - backends/guardrails-engine.yaml
  - backends/governance-proxy.yaml
  - backends/agent-api.yaml
  - backends/agent-runtime.yaml
  - backends/mcp-gateway.yaml
  - backends/ai-gateway.yaml
  - backends/platform-backend.yaml
  - backends/knowledge-engine.yaml
  - backends/model-deployment-service.yaml
  - backends/workspace-service.yaml
  - backends/remote-connections.yaml
  - backends/eval-engine.yaml

  # ── Jobs ──
  - jobs/seed-all.yaml
  - jobs/seed-keycloak.yaml
  - jobs/migrate-add-starred-chats.yaml

  # ── Frontend (unified UI) ──
  - frontends/katonic-frontend.yaml

  # ── Pod Disruption Budgets (auto-healing) ──
  - pdb.yaml

  # ── Istio service mesh ──
  - istio/gateway.yaml
  - istio/virtual-services.yaml
  - istio/destination-rules.yaml
  - istio/peer-authentication.yaml
  - istio/request-authentication.yaml
  - istio/authorization-policy.yaml
