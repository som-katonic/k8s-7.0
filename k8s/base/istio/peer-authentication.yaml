# PERMISSIVE allows both mTLS and plaintext — needed because Nginx
# reverse-proxy inside katonic-frontend connects to platform-backend
# without Istio client certs, causing "connection termination" with STRICT.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: katonic-default
  namespace: katonic
spec:
  mtls:
    mode: PERMISSIVE
---
# Keycloak needs PERMISSIVE mode to allow non-mesh clients:
# - seed-keycloak Job (no sidecar)
# - Frontend browser redirects (external)
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: keycloak-permissive
  namespace: katonic
spec:
  selector:
    matchLabels:
      app: keycloak
  mtls:
    mode: PERMISSIVE
