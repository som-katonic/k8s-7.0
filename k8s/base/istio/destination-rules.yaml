# ── AI/LLM services: higher limits for long-running inference requests ──
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ai-gateway
  namespace: katonic
spec:
  host: ai-gateway.katonic.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 50
        idleTimeout: 300s
      tcp:
        maxConnections: 200
        connectTimeout: 30s
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 60s
      baseEjectionTime: 60s
      maxEjectionPercent: 30
---
