# ── Standard backend services: mTLS + connection pooling + circuit breaking ──
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: admin-api
  namespace: katonic
spec:
  host: admin-api.katonic.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
