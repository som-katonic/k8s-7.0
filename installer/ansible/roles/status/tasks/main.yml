# ============================================================================
# Status Role - Print installation summary
# ============================================================================

- name: Get all katonic namespaces
  shell: kubectl get namespaces | grep katonic || echo "  (none found)"
  register: namespaces
  ignore_errors: true

- name: Get tenant-manager status
  shell: >
    kubectl get pods -n katonic-system
    -l app.kubernetes.io/name=tenant-manager -o wide
  register: tm_pods
  ignore_errors: true

- name: Get ingress IP
  shell: >
    kubectl get svc istio-ingress -n istio-system
    -o jsonpath='{.status.loadBalancer.ingress[0].hostname}{.status.loadBalancer.ingress[0].ip}'
  register: final_ingress
  ignore_errors: true

- name: Print installation summary
  debug:
    msg: |
      ===========================================================
       Katonic AI Platform v{{ platform_version }} - Installation Complete
      ===========================================================

       Cloud:         {{ deploy_on }}
       Cluster:       {{ cluster_name }}
       Domain:        {{ platform_domain | default('pending') }}
       Ingress:       {{ final_ingress.stdout | default('pending') }}
       Database:      {{ effective_db_mode }} ({{ db_host | default('unknown') }})
       Object Store:  {{ resolved_object_storage | trim }}
       Milvus:        {{ milvus_mode | default('standalone') }}

       Namespaces:
       {{ namespaces.stdout | default('  (checking...)') }}

       Tenant-Manager:
       {{ tm_pods.stdout | default('  (checking...)') }}

      ===========================================================
       WHAT HAPPENS NEXT:
       1. Tenant-manager is bootstrapping the platform
       2. It will create the Keycloak realm and admin user
       3. It will deploy all platform services
       4. Admin will receive login credentials at: {{ admin_email }}
       5. Platform URL: https://{{ platform_domain | default('pending') }}

       Monitor bootstrap:
         kubectl logs -n katonic-system -l app.kubernetes.io/name=tenant-manager -f

       Check status:
         kubectl get pods -n katonic-system
      ===========================================================
