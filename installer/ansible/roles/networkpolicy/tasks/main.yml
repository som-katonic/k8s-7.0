# ===========================================================================
# NetworkPolicy role: Namespace isolation for Gov/Distributor compliance
# GAP-3 from code review: no inter-namespace isolation by default
# ===========================================================================
---
- name: "[netpol] Skip if not enabled"
  when: not (networkpolicy_enabled | default(false) | bool)
  ansible.builtin.debug:
    msg: "NetworkPolicy not enabled. Set networkpolicy_enabled: true for namespace isolation."

- name: "[netpol] Apply katonic-system policies"
  when: networkpolicy_enabled | default(false) | bool
  ansible.builtin.shell: |
    cat <<'EOF' | kubectl apply -f -
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: default-deny-ingress
      namespace: katonic-system
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-intra-namespace
      namespace: katonic-system
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: katonic-system
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-from-istio
      namespace: katonic-system
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: istio-system
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-to-infra
      namespace: katonic-infra
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: katonic-system
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: katonic-keycloak
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: default-deny-ingress
      namespace: katonic-infra
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: default-deny-ingress
      namespace: katonic-keycloak
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-keycloak-from-system
      namespace: katonic-keycloak
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: katonic-system
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: istio-system
    EOF

- name: "[netpol] Policies applied"
  when: networkpolicy_enabled | default(false) | bool
  ansible.builtin.debug:
    msg: >
      NetworkPolicies applied: default-deny on katonic-system, katonic-infra,
      katonic-keycloak. Intra-namespace + Istio ingress allowed. Platform can
      reach infra and keycloak. External traffic blocked except via Istio gateway.
