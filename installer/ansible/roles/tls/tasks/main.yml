# ============================================================================
# TLS Role - Configure TLS certificates
# ============================================================================

- name: Apply Let's Encrypt ClusterIssuer (auto mode, single domain)
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-prod
    spec:
      acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: {{ admin_email }}
        privateKeySecretRef:
          name: letsencrypt-prod
        solvers:
          - http01:
              ingress:
                class: istio
    EOF
  when: tls_mode | default('auto') == 'auto' and not (wildcard_domain | default(False) | bool)

# Wildcard certs REQUIRE DNS-01 challenge (HTTP-01 cannot validate *.domain.com)

# AWS: cert-manager needs Route53 permissions via IRSA for DNS-01 validation
- name: Create IAM policy for cert-manager Route53 access
  shell: |
    POLICY_NAME="{{ cluster_name }}-cert-manager-dns01"
    ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

    # Create policy if it doesn't exist
    POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${POLICY_NAME}"
    aws iam get-policy --policy-arn "$POLICY_ARN" 2>/dev/null || \
    aws iam create-policy --policy-name "$POLICY_NAME" --policy-document '{
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": "route53:GetChange",
          "Resource": "arn:aws:route53:::change/*"
        },
        {
          "Effect": "Allow",
          "Action": [
            "route53:ChangeResourceRecordSets",
            "route53:ListResourceRecordSets"
          ],
          "Resource": "arn:aws:route53:::hostedzone/*"
        },
        {
          "Effect": "Allow",
          "Action": "route53:ListHostedZonesByName",
          "Resource": "*"
        }
      ]
    }'

    # Get EKS OIDC provider
    OIDC_URL=$(aws eks describe-cluster --name {{ cluster_name }} --region {{ aws_region }} \
      --query "cluster.identity.oidc.issuer" --output text)
    OIDC_ID=$(echo "$OIDC_URL" | sed 's|https://||')

    # Create IAM role for cert-manager service account
    ROLE_NAME="{{ cluster_name }}-cert-manager-dns01"
    aws iam get-role --role-name "$ROLE_NAME" 2>/dev/null || \
    aws iam create-role --role-name "$ROLE_NAME" --assume-role-policy-document '{
      "Version": "2012-10-17",
      "Statement": [{
        "Effect": "Allow",
        "Principal": {"Federated": "arn:aws:iam::'${ACCOUNT_ID}':oidc-provider/'${OIDC_ID}'"},
        "Action": "sts:AssumeRoleWithWebIdentity",
        "Condition": {
          "StringEquals": {
            "'${OIDC_ID}':sub": "system:serviceaccount:cert-manager:cert-manager",
            "'${OIDC_ID}':aud": "sts.amazonaws.com"
          }
        }
      }]
    }'

    aws iam attach-role-policy --role-name "$ROLE_NAME" --policy-arn "$POLICY_ARN" 2>/dev/null || true

    # Annotate cert-manager service account with the IAM role
    ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
    kubectl annotate serviceaccount cert-manager \
      -n cert-manager \
      eks.amazonaws.com/role-arn="$ROLE_ARN" \
      --overwrite

    # Restart cert-manager to pick up IRSA credentials
    kubectl rollout restart deployment cert-manager -n cert-manager
    kubectl rollout status deployment cert-manager -n cert-manager --timeout=120s
  when: cloud_provider == 'AWS' and wildcard_domain | default(False) | bool

- name: Apply Let's Encrypt ClusterIssuer with DNS-01 (wildcard)
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-prod
    spec:
      acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: {{ admin_email }}
        privateKeySecretRef:
          name: letsencrypt-prod
        solvers:
          - dns01:
    {% if cloud_provider == 'AWS' %}
              route53:
                region: {{ aws_region }}
    {% elif cloud_provider == 'Azure' %}
              azureDNS:
                subscriptionID: {{ azure_subscription_id | default('') }}
                resourceGroupName: {{ azure_resource_group | default('') }}
                hostedZoneName: {{ platform_domain.split('.')[1:] | join('.') }}
                environment: AzurePublicCloud
    {% elif cloud_provider == 'GCP' %}
              cloudDNS:
                project: {{ gcp_project_id | default('') }}
    {% else %}
              # OCI/Alibaba: use webhook solver or custom DNS provider
              # See: https://cert-manager.io/docs/configuration/acme/dns01/
              webhook: {}
    {% endif %}
    EOF
  when: tls_mode | default('auto') == 'auto' and wildcard_domain | default(False) | bool

- name: Create Istio Gateway with TLS (auto)
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: networking.istio.io/v1
    kind: Gateway
    metadata:
      name: katonic-gateway
      namespace: istio-system
    spec:
      selector:
        app: istio-ingress
      servers:
        - port:
            number: 443
            name: https
            protocol: HTTPS
          tls:
            mode: SIMPLE
            credentialName: katonic-tls
          hosts:
            - "{{ platform_domain }}"
            - "*.{{ platform_domain }}"
        - port:
            number: 80
            name: http
            protocol: HTTP
          tls:
            httpsRedirect: true
          hosts:
            - "{{ platform_domain }}"
            - "*.{{ platform_domain }}"
    EOF

# Wildcard cert for Distributor multi-org (each org gets <org-slug>.<domain>)
- name: Create wildcard Certificate (for Distributor multi-domain)
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: katonic-wildcard-tls
      namespace: istio-system
    spec:
      secretName: katonic-tls
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      dnsNames:
        - "{{ platform_domain }}"
        - "*.{{ platform_domain }}"
    EOF
  when: tls_mode | default('auto') == 'auto' and wildcard_domain | default(False) | bool

- name: Apply custom TLS certificate
  shell: |
    kubectl create secret tls katonic-tls \
      --cert={{ tls_cert_path }} \
      --key={{ tls_key_path }} \
      --namespace istio-system \
      --dry-run=client -o yaml | kubectl apply -f -
  when: tls_mode | default('auto') == 'custom'

- name: Display TLS status
  debug:
    msg: "TLS configured (mode: {{ tls_mode | default('auto') }})"
