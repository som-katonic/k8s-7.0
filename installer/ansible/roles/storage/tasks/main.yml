# ============================================================================
# Storage Role - Configure storage classes per cloud
# ============================================================================

- name: Configure AWS storage class (gp3)
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: gp3
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: ebs.csi.aws.com
    parameters:
      type: gp3
    volumeBindingMode: WaitForFirstConsumer
    allowVolumeExpansion: true
    EOF
  when: cloud_provider == 'AWS'
  ignore_errors: true

- name: Configure Azure storage class
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: managed-premium
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: disk.csi.azure.com
    parameters:
      skuName: Premium_LRS
    volumeBindingMode: WaitForFirstConsumer
    allowVolumeExpansion: true
    EOF
  when: cloud_provider == 'Azure'
  ignore_errors: true

- name: Configure GCP storage class
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: pd-ssd
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: pd.csi.storage.gke.io
    parameters:
      type: pd-ssd
    volumeBindingMode: WaitForFirstConsumer
    allowVolumeExpansion: true
    EOF
  when: cloud_provider == 'GCP'
  ignore_errors: true

- name: Configure OCI storage class
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: oci-bv
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: blockvolume.csi.oraclecloud.com
    parameters:
      vpusPerGB: "20"
    volumeBindingMode: WaitForFirstConsumer
    allowVolumeExpansion: true
    EOF
  when: cloud_provider == 'OCI'
  ignore_errors: true

- name: Configure Alibaba/SCCC storage class
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: alicloud-disk-essd
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: diskplugin.csi.alibabacloud.com
    parameters:
      type: cloud_essd
    volumeBindingMode: WaitForFirstConsumer
    allowVolumeExpansion: true
    EOF
  when: cloud_provider == 'Alibaba'
  ignore_errors: true

- name: Display storage class status
  debug:
    msg: "Storage class configured for {{ cloud_provider }}"

# ---- On-Premise / Bare Metal ----
# RKE2 ships with local-path-provisioner. If Longhorn is requested, install it.
# If a default StorageClass already exists, skip.

- name: Check for existing default StorageClass (on-prem)
  shell: kubectl get storageclass -o json | python3 -c "import sys,json; sc=json.load(sys.stdin)['items']; print(next((s['metadata']['name'] for s in sc if s.get('metadata',{}).get('annotations',{}).get('storageclass.kubernetes.io/is-default-class','')=='true'),'none'))" 2>/dev/null || echo "none"
  register: has_default_sc
  when: is_onprem | bool
  ignore_errors: true

- name: Detect existing StorageClasses (Nutanix, vSphere, etc)
  shell: kubectl get storageclass -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo ""
  register: existing_sc_list
  when: is_onprem | bool and (has_default_sc.stdout | default('none') | trim) == 'none'
  ignore_errors: true

- name: Set existing non-default StorageClass as default (Nutanix/vSphere/Portworx)
  shell: |
    # Find first known enterprise StorageClass and make it default
    for sc in nutanix-volume nutanix-dynamicfile vsphere-csi portworx-sc ceph-rbd; do
      if echo "{{ existing_sc_list.stdout | default('') }}" | grep -qw "$sc"; then
        kubectl patch storageclass $sc -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
        echo "Set $sc as default StorageClass"
        exit 0
      fi
    done
    echo "no-known-sc"
  register: auto_sc_result
  when: is_onprem | bool and (has_default_sc.stdout | default('none') | trim) == 'none' and (storage_provider | default('auto')) != 'longhorn'
  ignore_errors: true

- name: Install Longhorn for on-prem storage
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/longhorn/longhorn/v1.6.0/deploy/longhorn.yaml
    kubectl -n longhorn-system wait --for=condition=ready pod -l app=longhorn-manager --timeout=300s
    kubectl patch storageclass longhorn -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
  when: >
    is_onprem | bool
    and (has_default_sc.stdout | default('none') | trim) == 'none'
    and (auto_sc_result.stdout | default('no-known-sc') | trim) == 'no-known-sc'
    and (storage_provider | default('auto')) != 'existing'
  ignore_errors: true

- name: Ensure local-path StorageClass is default (RKE2 fallback)
  shell: |
    kubectl get storageclass local-path && \
    kubectl patch storageclass local-path -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}' || true
  when: >
    is_onprem | bool
    and (has_default_sc.stdout | default('none') | trim) == 'none'
    and (auto_sc_result.stdout | default('no-known-sc') | trim) == 'no-known-sc'
    and (storage_provider | default('auto')) == 'existing'
  ignore_errors: true
