---
# Install cluster-wide Kubernetes Operators for per-org database provisioning.
# Must run BEFORE any org is provisioned.
# Operators are installed once per cluster, not once per org.

# ── CloudNativePG ──────────────────────────────────────────────────────────
- name: Add CloudNativePG Helm repo
  kubernetes.core.helm_repository:
    name: cnpg
    repo_url: https://cloudnative-pg.github.io/charts

- name: Install CloudNativePG operator
  kubernetes.core.helm:
    name: cloudnative-pg
    chart_ref: cnpg/cloudnative-pg
    chart_version: "{{ cnpg_version | default('0.22.0') }}"
    release_namespace: cnpg-system
    create_namespace: true
    wait: true
    wait_timeout: "5m"
    values:
      replicaCount: 1

# ── MongoDB Community Operator ─────────────────────────────────────────────
- name: Add MongoDB Community Operator Helm repo
  kubernetes.core.helm_repository:
    name: mongodb
    repo_url: https://mongodb.github.io/helm-charts

- name: Install MongoDB Community Operator
  kubernetes.core.helm:
    name: community-operator
    chart_ref: mongodb/community-operator
    chart_version: "{{ mongodb_operator_version | default('0.10.0') }}"
    release_namespace: mongodb-operator
    create_namespace: true
    wait: true
    wait_timeout: "5m"
    values:
      operator:
        watchNamespace: "*"   # watch all namespaces for MongoDBCommunity CRDs

# ── Milvus Operator ────────────────────────────────────────────────────────
- name: Add Milvus Operator Helm repo
  kubernetes.core.helm_repository:
    name: milvus-operator
    repo_url: https://zilliztech.github.io/milvus-operator

- name: Install Milvus Operator
  kubernetes.core.helm:
    name: milvus-operator
    chart_ref: milvus-operator/milvus-operator
    chart_version: "{{ milvus_operator_version | default('1.1.2') }}"
    release_namespace: milvus-operator
    create_namespace: true
    wait: true
    wait_timeout: "5m"

# ── Verify ─────────────────────────────────────────────────────────────────
- name: Wait for CloudNativePG operator pod
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: cnpg-system
    name: cloudnative-pg
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 120

- name: Wait for MongoDB operator pod
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: mongodb-operator
    name: community-operator-mongodb-kubernetes-operator
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 120

- name: Wait for Milvus operator pod
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: milvus-operator
    name: milvus-operator
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 120

- name: Operators installed
  debug:
    msg: "CloudNativePG, MongoDB Community Operator, and Milvus Operator are ready."
