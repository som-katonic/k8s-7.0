# ============================================================================
# Platform Role - Deploy All Platform Services
# ============================================================================
# Deploys the katonic-platform umbrella Helm chart which includes:
#   - All generic services (admin-api, observability, etc.) via templates
#   - Subcharts: tenant-manager, model-deployment, ace-bff
#   - Istio Gateway + VirtualService for external routing
#
# Steps:
#   1. Create namespace
#   2. Create Kubernetes secrets (DB creds, Keycloak creds, Redis, etc.)
#   3. Create license ConfigMap
#   4. Deploy umbrella Helm chart (all services)
#   5. Wait for tenant-manager bootstrap to complete
# ============================================================================

# ------------------------------------------------------------------
# 1. Create namespace
# ------------------------------------------------------------------
- name: Create tenant-manager namespace
  shell: kubectl create namespace katonic-system --dry-run=client -o yaml | kubectl apply -f -

# ------------------------------------------------------------------
# 2. Create Kubernetes Secrets
# ------------------------------------------------------------------
- name: Create database credentials secret
  shell: |
    kubectl create secret generic tenant-manager-db \
      --namespace katonic-system \
      --from-literal=host={{ db_host }} \
      --from-literal=port={{ db_port }} \
      --from-literal=database={{ db_name }} \
      --from-literal=username={{ db_user }} \
      --from-literal=password={{ db_password }} \
      --from-literal=connection-string="{{ db_connection_string }}" \
      --dry-run=client -o yaml | kubectl apply -f -
  no_log: true

- name: Create Keycloak credentials secret
  shell: |
    kubectl create secret generic tenant-manager-keycloak \
      --namespace katonic-system \
      --from-literal=url={{ keycloak_url }} \
      --from-literal=admin-user={{ keycloak_admin_user }} \
      --from-literal=admin-password={{ keycloak_admin_password }} \
      --dry-run=client -o yaml | kubectl apply -f -
  no_log: true

- name: Create Redis credentials secret
  shell: |
    kubectl create secret generic tenant-manager-redis \
      --namespace katonic-system \
      --from-literal=host={{ redis_host }} \
      --from-literal=port={{ redis_port }} \
      --from-literal=password={{ redis_password }} \
      --from-literal=url="redis://:{{ redis_password }}@{{ redis_host }}:{{ redis_port }}" \
      --dry-run=client -o yaml | kubectl apply -f -
  no_log: true

- name: Create object storage secret
  shell: |
    kubectl create secret generic tenant-manager-object-storage \
      --namespace katonic-system \
      --from-literal=type={{ resolved_object_storage | trim }} \
      --from-literal=endpoint={{ object_storage_endpoint | default(minio_endpoint | default('')) }} \
      --from-literal=region={{ object_storage_region | default('') }} \
      --from-literal=bucket-prefix={{ object_storage_bucket_prefix | default('katonic') }} \
      --from-literal=access-key={{ object_storage_access_key | default(minio_access_key | default('')) }} \
      --from-literal=secret-key={{ object_storage_secret_key | default(minio_secret_key | default('')) }} \
      --dry-run=client -o yaml | kubectl apply -f -
  no_log: true

- name: Create container registry secret
  shell: |
    kubectl create secret docker-registry katonic-registry \
      --namespace katonic-system \
      --docker-server={{ image_registry | default('quay.io/katonic') }} \
      --docker-username={{ registry_username | default('katonic+platform_default_robot_user') }} \
      --docker-password={{ registry_password | default('') }} \
      --dry-run=client -o yaml | kubectl apply -f -
  when: custom_registry | default(False) | bool
  no_log: true

# ------------------------------------------------------------------
# 3. Create License ConfigMap
# ------------------------------------------------------------------
- name: Copy license file to temp
  shell: cp "{{ license_file_path }}" /tmp/license.json

- name: Create license ConfigMap
  shell: |
    kubectl create configmap tenant-manager-license \
      --namespace katonic-system \
      --from-file=license.json=/tmp/license.json \
      --dry-run=client -o yaml | kubectl apply -f -

- name: Clean up temp license
  file:
    path: /tmp/license.json
    state: absent

# ------------------------------------------------------------------
# 4. Deploy platform via Helm umbrella chart
# ------------------------------------------------------------------
# The umbrella chart deploys ALL platform services (generic services
# from the services: map + subcharts: tenant-manager, model-deployment,
# ace-bff) plus Istio Gateway/VirtualService for external access.
# ------------------------------------------------------------------
- name: Deploy platform umbrella chart
  shell: >
    helm upgrade --install katonic-platform
    {{ installer_root }}/charts/katonic-platform
    --namespace katonic-system
    {% if deployment_mode | default('platform') == 'cloud' %}
    -f {{ installer_root }}/charts/katonic-platform/values-cloud.yaml
    {% endif %}
    --set global.imageRegistry={{ image_registry | default('registry.katonic.ai') }}
    --set global.imageTag={{ platform_version }}
    --set global.domain={{ platform_domain | trim }}
    --set global.deploymentMode={{ deployment_mode | default('platform') }}
    --set global.postgresql.host={{ db_host }}
    --set global.postgresql.port={{ db_port }}
    --set global.postgresql.database={{ db_name }}
    --set global.postgresql.username={{ db_user }}
    --set global.postgresql.password={{ db_password }}
    --set global.redis.host={{ redis_host }}
    --set global.redis.port={{ redis_port }}
    --set global.keycloak.serverUrl=http://{{ keycloak_url | default('keycloak.katonic-keycloak.svc.cluster.local:8080') }}
    --set global.keycloak.adminUser={{ keycloak_admin_user | default('admin') }}
    --set global.milvus.host={{ milvus_host | default('milvus.katonic-infra.svc.cluster.local') }}
    --set global.milvus.port={{ milvus_port | default(19530) }}
    --set global.clickhouse.host={{ clickhouse_host | default('clickhouse.katonic-infra.svc.cluster.local') }}
    --set global.clickhouse.port={{ clickhouse_port | default(8123) }}
    --set global.clickhouse.database={{ clickhouse_database | default('platform') }}
    --set global.mongodb.host={{ mongodb_host | default('mongodb.katonic-infra.svc.cluster.local') }}
    --set global.mongodb.port={{ mongodb_port | default(27017) }}
    --set global.objectStorage.endpoint={{ object_storage_endpoint | default(minio_endpoint | default('minio.katonic-infra.svc.cluster.local:9000')) }}
    --set global.objectStorage.bucket={{ object_storage_bucket | default('katonic-data') }}
    --set gateway.enabled=true
    --set gateway.tls.enabled={{ 'true' if tls_mode | default('auto') != 'none' else 'false' }}
    --set gateway.tls.credentialName={{ tls_secret_name | default('katonic-tls') }}
    --set gateway.httpsRedirect={{ 'true' if tls_mode | default('auto') != 'none' else 'false' }}
    --set gateway.wildcardDomain={{ wildcard_domain | default(False) }}
    --set "services.distributor-console.extraEnv[1].value={{ prometheus_endpoint | default('http://prometheus-kube-prometheus-prometheus.katonic-monitoring.svc.cluster.local:9090') }}"
    --set tenant-manager.image.registry={{ image_registry | default('registry.katonic.ai') }}
    --set tenant-manager.image.repository=tenant-manager
    --set tenant-manager.image.tag={{ platform_version }}
    --set tenant-manager.config.platformVersion={{ platform_version }}
    --set tenant-manager.config.deploymentMode={{ deployment_mode | default('platform') }}
    --set tenant-manager.config.adminEmail={{ admin_email }}
    --set tenant-manager.config.adminFirstName={{ admin_first_name | default('Platform') }}
    --set tenant-manager.config.adminLastName={{ admin_last_name | default('Admin') }}
    --set tenant-manager.config.domain={{ platform_domain | trim }}
    --set tenant-manager.config.cloudProvider={{ deploy_on }}
    --set tenant-manager.config.milvusMode={{ milvus_mode | default('standalone') }}
    --set tenant-manager.config.gpuEnabled={{ gpu_enabled | default(False) }}
    --set tenant-manager.config.imageRegistry={{ image_registry | default('registry.katonic.ai') }}
    --set tenant-manager.config.objectStorageType={{ resolved_object_storage | trim }}
    --set tenant-manager.config.multiTenancy.maxOrganizations={{ max_organizations | default(0) }}
    --set tenant-manager.config.multiTenancy.orgNamespacePrefix={{ org_namespace_prefix | default('org') }}
    --set tenant-manager.config.multiTenancy.wildcardDomain={{ wildcard_domain | default(False) }}
    --set tenant-manager.config.multiTenancy.resourceIsolation={{ org_resource_isolation | default('strict') }}
    --set tenant-manager.secrets.db=tenant-manager-db
    --set tenant-manager.secrets.keycloak=tenant-manager-keycloak
    --set tenant-manager.secrets.redis=tenant-manager-redis
    --set tenant-manager.secrets.objectStorage=tenant-manager-object-storage
    --set tenant-manager.secrets.license=tenant-manager-license
    {% if custom_smtp | default(False) | bool %}
    --set tenant-manager.smtp.enabled=true
    --set tenant-manager.smtp.host={{ smtp_host | default('') }}
    --set tenant-manager.smtp.port={{ smtp_port | default(587) }}
    --set tenant-manager.smtp.user={{ smtp_user | default('') }}
    --set tenant-manager.smtp.password={{ smtp_password | default('') }}
    --set tenant-manager.smtp.from={{ smtp_from | default('noreply@katonic.ai') }}
    {% endif %}
    --wait --timeout 10m
  register: helm_deploy
  no_log: true

- name: Display Helm deploy result
  debug:
    msg: "Platform deployed: {{ helm_deploy.stdout_lines[-1] | default('OK') }}"

# ------------------------------------------------------------------
# 5. Wait for tenant-manager bootstrap
# ------------------------------------------------------------------
- name: Wait for tenant-manager pod to be ready
  shell: >
    kubectl wait --for=condition=ready pod
    -l app.kubernetes.io/name=tenant-manager
    -n katonic-system
    --timeout=120s
  retries: 3
  delay: 10

- name: Wait for tenant-manager bootstrap to complete
  shell: |
    for i in $(seq 1 60); do
      STATUS=$(kubectl exec -n katonic-system \
        $(kubectl get pod -n katonic-system -l app.kubernetes.io/name=tenant-manager -o name | head -1) \
        -- curl -s http://localhost:8015/healthz 2>/dev/null || echo '{"status":"starting"}')

      BOOTSTRAP=$(echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('bootstrap','unknown'))" 2>/dev/null || echo "unknown")

      if [ "$BOOTSTRAP" = "complete" ]; then
        echo "Bootstrap complete!"
        exit 0
      elif [ "$BOOTSTRAP" = "failed" ]; then
        echo "Bootstrap FAILED. Check logs: kubectl logs -n katonic-system -l app.kubernetes.io/name=tenant-manager"
        exit 1
      fi

      echo "Bootstrap status: $BOOTSTRAP (attempt $i/60)..."
      sleep 10
    done
    echo "Bootstrap timed out after 10 minutes"
    exit 1
  register: bootstrap_result
  retries: 1

- name: Display bootstrap result
  debug:
    msg: "{{ bootstrap_result.stdout_lines[-1] | default('Bootstrap status unknown') }}"

- name: Get tenant-manager logs on failure
  shell: >
    kubectl logs -n katonic-system
    -l app.kubernetes.io/name=tenant-manager
    --tail=50
  when: bootstrap_result.rc != 0
  register: tm_logs
  ignore_errors: true

- name: Show failure logs
  debug:
    msg: "{{ tm_logs.stdout_lines | default(['No logs available']) }}"
  when: bootstrap_result.rc != 0

- name: Fail if bootstrap failed
  fail:
    msg: "Tenant-manager bootstrap failed. Check logs above."
  when: bootstrap_result.rc != 0
