# ===========================================================================
# DNS role: Create DNS records for platform domain
# Supports: AWS Route53, Azure DNS, GCP Cloud DNS, OCI DNS, Alibaba DNS
# ===========================================================================
---
- name: "[dns] Get Istio gateway external IP"
  ansible.builtin.shell: |
    kubectl get svc istio-ingress -n istio-system \
      -o jsonpath='{.status.loadBalancer.ingress[0].ip}{.status.loadBalancer.ingress[0].hostname}'
  register: gateway_ip
  retries: 12
  delay: 10
  until: gateway_ip.stdout | length > 0

- name: "[dns] Set gateway address"
  ansible.builtin.set_fact:
    platform_gateway: "{{ gateway_ip.stdout }}"

# ---- AWS Route53 ---------------------------------------------------------
- name: "[dns] Create Route53 record"
  when: cloud_provider == 'aws'
  ansible.builtin.shell: |
    HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
      --dns-name "{{ domain }}" \
      --query 'HostedZones[0].Id' --output text | sed 's|/hostedzone/||')

    if [ -z "$HOSTED_ZONE_ID" ] || [ "$HOSTED_ZONE_ID" = "None" ]; then
      echo "ERROR: No Route53 hosted zone found for {{ domain }}"
      exit 1
    fi

    # Determine record type (IP = A, hostname = CNAME)
    if echo "{{ platform_gateway }}" | grep -qP '^\d+\.\d+\.\d+\.\d+$'; then
      RECORD_TYPE="A"
      VALUE='"{{ platform_gateway }}"'
    else
      RECORD_TYPE="CNAME"
      VALUE='"{{ platform_gateway }}"'
    fi

    aws route53 change-resource-record-sets \
      --hosted-zone-id "$HOSTED_ZONE_ID" \
      --change-batch '{
        "Changes": [{
          "Action": "UPSERT",
          "ResourceRecordSet": {
            "Name": "{{ domain }}",
            "Type": "'$RECORD_TYPE'",
            "TTL": 300,
            "ResourceRecords": [{"Value": '$VALUE'}]
          }
        },
        {
          "Action": "UPSERT",
          "ResourceRecordSet": {
            "Name": "*.{{ domain }}",
            "Type": "'$RECORD_TYPE'",
            "TTL": 300,
            "ResourceRecords": [{"Value": '$VALUE'}]
          }
        }]
      }'
  register: route53_result

# ---- Azure DNS -----------------------------------------------------------
- name: "[dns] Create Azure DNS record"
  when: cloud_provider == 'azure'
  ansible.builtin.shell: |
    RG="{{ azure_resource_group | default(cluster_name + '-rg') }}"
    ZONE="{{ domain }}"

    # Create A record for apex
    az network dns record-set a add-record \
      --resource-group "$RG" \
      --zone-name "$ZONE" \
      --record-set-name "@" \
      --ipv4-address "{{ platform_gateway }}" \
      2>/dev/null || \
    az network dns record-set cname set-record \
      --resource-group "$RG" \
      --zone-name "$ZONE" \
      --record-set-name "@" \
      --cname "{{ platform_gateway }}"

    # Create wildcard record
    az network dns record-set a add-record \
      --resource-group "$RG" \
      --zone-name "$ZONE" \
      --record-set-name "*" \
      --ipv4-address "{{ platform_gateway }}" \
      2>/dev/null || \
    az network dns record-set cname set-record \
      --resource-group "$RG" \
      --zone-name "$ZONE" \
      --record-set-name "*" \
      --cname "{{ platform_gateway }}"
  register: azure_dns_result

# ---- GCP Cloud DNS -------------------------------------------------------
- name: "[dns] Create GCP Cloud DNS record"
  when: cloud_provider == 'gcp'
  ansible.builtin.shell: |
    PROJECT="{{ gcp_project_id }}"
    ZONE_NAME=$(gcloud dns managed-zones list --project="$PROJECT" \
      --filter="dnsName={{ domain }}." --format="value(name)" | head -1)

    if [ -z "$ZONE_NAME" ]; then
      echo "ERROR: No Cloud DNS zone found for {{ domain }}"
      exit 1
    fi

    gcloud dns record-sets transaction start --zone="$ZONE_NAME" --project="$PROJECT"

    # Remove existing records if any
    gcloud dns record-sets transaction remove \
      --zone="$ZONE_NAME" --project="$PROJECT" \
      --name="{{ domain }}." --type=A --ttl=300 2>/dev/null || true

    gcloud dns record-sets transaction add "{{ platform_gateway }}" \
      --zone="$ZONE_NAME" --project="$PROJECT" \
      --name="{{ domain }}." --type=A --ttl=300

    gcloud dns record-sets transaction add "{{ platform_gateway }}" \
      --zone="$ZONE_NAME" --project="$PROJECT" \
      --name="*.{{ domain }}." --type=A --ttl=300

    gcloud dns record-sets transaction execute --zone="$ZONE_NAME" --project="$PROJECT"
  register: gcp_dns_result

# ---- OCI DNS -------------------------------------------------------------
- name: "[dns] Create OCI DNS record"
  when: cloud_provider == 'oci'
  ansible.builtin.shell: |
    COMPARTMENT="{{ oci_compartment_id }}"
    ZONE="{{ domain }}"

    oci dns record zone patch \
      --zone-name-or-id "$ZONE" \
      --compartment-id "$COMPARTMENT" \
      --items '[
        {"domain":"{{ domain }}","rdata":"{{ platform_gateway }}","rtype":"A","ttl":300},
        {"domain":"*.{{ domain }}","rdata":"{{ platform_gateway }}","rtype":"A","ttl":300}
      ]'
  register: oci_dns_result

# ---- Alibaba DNS ---------------------------------------------------------
- name: "[dns] Create Alibaba DNS record"
  when: cloud_provider == 'alibaba'
  ansible.builtin.shell: |
    # Add apex record
    aliyun alidns AddDomainRecord \
      --DomainName "{{ domain }}" \
      --RR "@" \
      --Type A \
      --Value "{{ platform_gateway }}" \
      --TTL 300 2>/dev/null || \
    aliyun alidns UpdateDomainRecord \
      --DomainName "{{ domain }}" \
      --RR "@" \
      --Type A \
      --Value "{{ platform_gateway }}"

    # Add wildcard record
    aliyun alidns AddDomainRecord \
      --DomainName "{{ domain }}" \
      --RR "*" \
      --Type A \
      --Value "{{ platform_gateway }}" \
      --TTL 300 2>/dev/null || \
    aliyun alidns UpdateDomainRecord \
      --DomainName "{{ domain }}" \
      --RR "*" \
      --Type A \
      --Value "{{ platform_gateway }}"
  register: alibaba_dns_result

# ---- Bare Metal ----------------------------------------------------------
- name: "[dns] Manual DNS instructions for bare metal"
  when: cloud_provider == 'bare_metal'
  ansible.builtin.debug:
    msg: |
      Please create the following DNS records manually:
        {{ domain }}    A/CNAME  {{ platform_gateway }}
        *.{{ domain }}  A/CNAME  {{ platform_gateway }}

- name: "[dns] DNS records configured"
  ansible.builtin.debug:
    msg: "DNS records point {{ domain }} and *.{{ domain }} to {{ platform_gateway }}"
