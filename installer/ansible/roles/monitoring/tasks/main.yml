# ============================================================================
# Monitoring Role - Prometheus + Grafana
# ============================================================================

# -- Detect existing Prometheus (Rancher monitoring, etc.) --
- name: Check for existing Prometheus installation
  shell: |
    # Check rancher-monitoring or any kube-prometheus-stack
    PROM_NS=$(kubectl get prometheus -A -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo "")
    if [ -n "$PROM_NS" ]; then
      PROM_SVC=$(kubectl get svc -n $PROM_NS -l app.kubernetes.io/name=prometheus -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
      echo "${PROM_NS}/${PROM_SVC}"
    else
      echo "none"
    fi
  register: existing_prometheus
  ignore_errors: true

- name: Log existing Prometheus status
  debug:
    msg: "{{ 'Found existing Prometheus: ' + existing_prometheus.stdout if existing_prometheus.stdout | default('none') != 'none' else 'No existing Prometheus — will deploy our own' }}"

- name: Set Prometheus endpoint fact (existing)
  set_fact:
    prometheus_endpoint: "http://{{ existing_prometheus.stdout.split('/')[1] }}.{{ existing_prometheus.stdout.split('/')[0] }}.svc.cluster.local:9090"
  when: existing_prometheus.stdout | default('none') != 'none' and '/' in (existing_prometheus.stdout | default(''))

# -- Deploy our own monitoring if none exists --
- name: Create monitoring namespace
  shell: kubectl create namespace katonic-monitoring --dry-run=client -o yaml | kubectl apply -f -
  when: existing_prometheus.stdout | default('none') == 'none'

- name: Add Prometheus Helm repo
  shell: >
    helm repo add prometheus-community
    https://prometheus-community.github.io/helm-charts && helm repo update
  when: existing_prometheus.stdout | default('none') == 'none'
  ignore_errors: true

- name: Deploy kube-prometheus-stack
  shell: >
    helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
    --namespace katonic-monitoring
    --set grafana.adminPassword=katonic-admin
    --set prometheus.prometheusSpec.retention=30d
    --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage=50Gi
    --set grafana.persistence.enabled=true
    --set grafana.persistence.size=10Gi
    --wait --timeout 10m
  when: existing_prometheus.stdout | default('none') == 'none'
  ignore_errors: true

- name: Set Prometheus endpoint fact (newly deployed)
  set_fact:
    prometheus_endpoint: "http://prometheus-kube-prometheus-prometheus.katonic-monitoring.svc.cluster.local:9090"
  when: existing_prometheus.stdout | default('none') == 'none'

- name: Display monitoring status
  debug:
    msg: "{{ 'Reusing existing Prometheus at: ' + (prometheus_endpoint | default('')) if existing_prometheus.stdout | default('none') != 'none' else 'Monitoring stack deployed in katonic-monitoring namespace' }}"

# Multi-tenant monitoring: enable per-org metrics if Distributor
- name: Configure multi-tenant monitoring labels
  shell: |
    # Add tenant label to Prometheus scrape config so per-org metrics can be filtered
    kubectl patch prometheus monitoring-kube-prometheus-prometheus \
      -n katonic-monitoring \
      --type merge \
      -p '{"spec":{"externalLabels":{"cluster":"{{ cluster_name }}","multi_tenant":"true"}}}' || true
  when: max_organizations | default(0) | int > 1 or max_organizations | default(0) | int == 0
  ignore_errors: true
