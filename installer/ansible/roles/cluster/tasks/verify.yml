# ============================================================================
# Cluster Role - Verify Connectivity
# ============================================================================

- name: Check kubectl connectivity
  shell: kubectl cluster-info
  register: cluster_info
  retries: 5
  delay: 15
  until: cluster_info.rc == 0

- name: Count cluster nodes
  shell: kubectl get nodes --no-headers | wc -l
  register: node_count

- name: Verify minimum node count
  assert:
    that:
      - node_count.stdout | int >= 1
    fail_msg: "Cluster has no nodes. Expected at least 1."
    success_msg: "Cluster has {{ node_count.stdout }} node(s)"

- name: Get Kubernetes version
  shell: kubectl version -o json | jq -r '.serverVersion.gitVersion'
  register: k8s_version
  ignore_errors: true

- name: Display cluster status
  debug:
    msg: |
      Cluster:    {{ cluster_name }}
      Provider:   {{ deploy_on }}
      Nodes:      {{ node_count.stdout }}
      K8s:        {{ k8s_version.stdout | default('unknown') }}
      Status:     READY
