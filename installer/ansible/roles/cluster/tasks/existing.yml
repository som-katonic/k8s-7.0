# ============================================================================
# Cluster Role - Connect to Existing Cluster
# ============================================================================

- name: Get credentials for existing cluster
  block:
    - name: Get EKS credentials (existing)
      shell: >
        aws eks update-kubeconfig
        --name {{ cluster_name }}
        --region {{ aws_region }}
      when: cloud_provider == 'AWS'

    - name: Get AKS credentials (existing)
      shell: >
        az aks get-credentials
        --resource-group {{ azure_resource_group }}
        --name {{ cluster_name }}
        --overwrite-existing
        --subscription {{ azure_subscription_id }}
      when: cloud_provider == 'Azure'

    - name: Get GKE credentials (existing)
      shell: >
        gcloud container clusters get-credentials {{ cluster_name }}
        --region {{ gcp_region }}
        --project {{ gcp_project_id }}
      when: cloud_provider == 'GCP'

    - name: Get OKE credentials (existing)
      shell: >
        oci ce cluster create-kubeconfig
        --cluster-id {{ oci_cluster_id | default('') }}
        --file ~/.kube/config
        --region {{ oci_region }}
        --token-version 2.0.0
      when: cloud_provider == 'OCI'

    - name: Get ACK credentials (existing)
      shell: |
        aliyun cs GET /k8s/{{ alibaba_cluster_id | default('') }}/user_config \
          --region {{ 'me-riyadh' if sccc_mode | default(false) | bool else alibaba_region | default('cn-hangzhou') }} \
          | jq -r '.config' > ~/.kube/config
      when: cloud_provider == 'Alibaba'

    - name: On-premise - verify kubeconfig
      shell: kubectl cluster-info
      when: cloud_provider == 'On-Premise'

  rescue:
    - name: Connection failed
      fail:
        msg: "Failed to connect to existing {{ cloud_provider }} cluster: {{ cluster_name }}"
