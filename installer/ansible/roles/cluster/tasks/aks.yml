# ============================================================================
# Cluster Role - AKS Creation (Azure)
# ============================================================================

- name: Create resource group
  shell: >
    az group create
    --name {{ azure_resource_group }}
    --location {{ azure_location | default('eastus') }}
  register: rg_result

- name: Create AKS cluster (this takes 10-20 minutes)
  shell: >
    az aks create
    --resource-group {{ azure_resource_group }}
    --name {{ cluster_name }}
    --node-count {{ platform_nodes.min_count }}
    --node-vm-size {{ platform_nodes.instance_type }}
    --os-disk-size-gb {{ platform_nodes.os_disk_size }}
    --enable-cluster-autoscaler
    --min-count {{ platform_nodes.min_count }}
    --max-count {{ platform_nodes.max_count }}
    --kubernetes-version {{ aks_version | default('1.30') }}
    --generate-ssh-keys
    --network-plugin azure
    --subscription {{ azure_subscription_id }}
    {% if private_cluster | default(False) | bool %}--enable-private-cluster{% endif %}
    --yes
  register: aks_create
  async: 1800
  poll: 30

- name: Add compute node pool
  shell: >
    az aks nodepool add
    --resource-group {{ azure_resource_group }}
    --cluster-name {{ cluster_name }}
    --name compute
    --node-count {{ compute_nodes.min_count }}
    --node-vm-size {{ compute_nodes.instance_type }}
    --os-disk-size-gb {{ compute_nodes.os_disk_size }}
    --enable-cluster-autoscaler
    --min-count {{ compute_nodes.min_count }}
    --max-count {{ compute_nodes.max_count }}

- name: Add vectordb node pool
  shell: >
    az aks nodepool add
    --resource-group {{ azure_resource_group }}
    --cluster-name {{ cluster_name }}
    --name vectordb
    --node-count {{ vectordb_nodes.min_count }}
    --node-vm-size {{ vectordb_nodes.instance_type }}
    --os-disk-size-gb {{ vectordb_nodes.os_disk_size }}
    --enable-cluster-autoscaler
    --min-count {{ vectordb_nodes.min_count }}
    --max-count {{ vectordb_nodes.max_count }}

- name: Get AKS credentials
  shell: >
    az aks get-credentials
    --resource-group {{ azure_resource_group }}
    --name {{ cluster_name }}
    --overwrite-existing
    --subscription {{ azure_subscription_id }}

- name: Add GPU node pool (Azure)
  shell: >
    az aks nodepool add
    --resource-group {{ azure_resource_group }}
    --cluster-name {{ cluster_name }}
    --name gpu
    --node-count {{ gpu_nodes.min_count | default(0) }}
    --node-vm-size {{ gpu_nodes.instance_type | default('Standard_NC6s_v3') }}
    --os-disk-size-gb {{ gpu_nodes.os_disk_size | default(256) }}
    --enable-cluster-autoscaler
    --min-count {{ gpu_nodes.min_count | default(0) }}
    --max-count {{ gpu_nodes.max_count | default(2) }}
    --node-taints nvidia.com/gpu=true:NoSchedule
    --labels role=gpu nvidia.com/gpu.present=true
  when: gpu_enabled | default(False) | bool

- name: Verify AKS connectivity
  shell: kubectl get nodes --no-headers
  register: aks_nodes
  retries: 10
  delay: 30
  until: aks_nodes.rc == 0

- name: Display AKS cluster info
  debug:
    msg: "AKS cluster {{ cluster_name }} ready with {{ aks_nodes.stdout_lines | length }} nodes"
