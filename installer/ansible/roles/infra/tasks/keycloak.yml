# ============================================================================
# Infra Role - Keycloak
# ============================================================================
# Deploys Keycloak server only. Realm/user creation is tenant-manager's job.
# ============================================================================

- name: Create keycloak namespace
  shell: kubectl create namespace katonic-keycloak --dry-run=client -o yaml | kubectl apply -f -

- name: Ensure keycloak database exists
  shell: |
    kubectl run pg-ensure-kcdb --rm -i --restart=Never \
      --namespace katonic-infra \
      --image=bitnami/postgresql:latest \
      --env="PGPASSWORD={{ db_password }}" \
      -- psql -h {{ db_host }} -U {{ db_user }} -d {{ db_name }} \
      -c "SELECT 'CREATE DATABASE keycloak' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec"
  no_log: true
  retries: 3
  delay: 10
  ignore_errors: true

- name: Generate Keycloak admin password
  shell: openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24
  register: kc_password_gen
  no_log: true

- name: Set Keycloak credentials
  set_fact:
    keycloak_admin_user: "admin"
    keycloak_admin_password: "{{ kc_password_gen.stdout }}"
    keycloak_url: "http://keycloak.katonic-keycloak.svc.cluster.local:8080"
  no_log: true

- name: Add Bitnami Helm repo
  shell: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update
  ignore_errors: true

- name: Deploy Keycloak
  shell: >
    helm upgrade --install keycloak bitnami/keycloak
    --namespace katonic-keycloak
    --set auth.adminUser={{ keycloak_admin_user }}
    --set auth.adminPassword={{ keycloak_admin_password }}
    --set replicaCount={{ keycloak_replicas | default(1) }}
    --set postgresql.enabled=false
    --set externalDatabase.host={{ db_host }}
    --set externalDatabase.port={{ db_port }}
    --set externalDatabase.user={{ db_user }}
    --set externalDatabase.password={{ db_password }}
    --set externalDatabase.database=keycloak
    --set resources.requests.memory=1Gi
    --set resources.requests.cpu=500m
    --set resources.limits.memory=2Gi
    --set resources.limits.cpu=2
    --set proxy.edge=true
    --wait --timeout 10m

- name: Wait for Keycloak ready
  shell: >
    kubectl wait --for=condition=ready pod
    -l app.kubernetes.io/name=keycloak
    -n katonic-keycloak
    --timeout=300s
  retries: 3
  delay: 30

- name: Display Keycloak status
  debug:
    msg: "Keycloak deployed at {{ keycloak_url }} (admin user: {{ keycloak_admin_user }})"
