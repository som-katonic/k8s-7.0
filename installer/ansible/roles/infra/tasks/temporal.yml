# ============================================================================
# Infra Role - Temporal (workflow engine for knowledge-engine)
#
# Deploys temporalio/auto-setup which runs all Temporal services in a single
# process and auto-initializes database schema on first boot.
# Uses existing PostgreSQL for persistence (creates temporal/temporal_visibility DBs).
# ============================================================================

- name: Set Temporal facts
  set_fact:
    temporal_host: "temporal.katonic-infra.svc.cluster.local"
    temporal_port: "7233"
    temporal_namespace: "default"
    temporal_task_queue: "knowledge-engine"

- name: Create Temporal databases in PostgreSQL
  shell: |
    kubectl exec -n katonic-infra deploy/postgresql -- psql -U {{ pg_username }} -d postgres -c \
      "SELECT 'CREATE DATABASE temporal' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'temporal')\gexec"
    kubectl exec -n katonic-infra deploy/postgresql -- psql -U {{ pg_username }} -d postgres -c \
      "SELECT 'CREATE DATABASE temporal_visibility' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'temporal_visibility')\gexec"
  register: temporal_db_result
  failed_when: false
  changed_when: "'CREATE DATABASE' in temporal_db_result.stdout"

- name: Deploy Temporal (auto-setup)
  shell: |
    cat <<'EOF' | kubectl apply -n katonic-infra -f -
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: temporal
      namespace: katonic-infra
    spec:
      selector:
        app: temporal
      ports:
        - name: grpc-frontend
          port: 7233
          targetPort: 7233
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: temporal
      namespace: katonic-infra
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: temporal
      template:
        metadata:
          labels:
            app: temporal
        spec:
          containers:
            - name: temporal
              image: temporalio/auto-setup:latest
              ports:
                - containerPort: 7233
              env:
                - name: DB
                  value: "postgres12"
                - name: DB_PORT
                  value: "5432"
                - name: POSTGRES_USER
                  value: "{{ pg_username }}"
                - name: POSTGRES_PWD
                  value: "{{ pg_password }}"
                - name: POSTGRES_SEEDS
                  value: "{{ pg_host | regex_replace('\\.katonic-infra.*', '') }}"
                - name: SKIP_DYNAMIC_CONFIG_UPDATE
                  value: "true"
                - name: BIND_ON_IP
                  value: "0.0.0.0"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
              readinessProbe:
                exec:
                  command: ["/bin/sh", "-c", "tctl --address $(hostname -i):7233 cluster health > /dev/null 2>&1"]
                initialDelaySeconds: 30
                periodSeconds: 15
                timeoutSeconds: 5
              livenessProbe:
                exec:
                  command: ["/bin/sh", "-c", "tctl --address $(hostname -i):7233 cluster health > /dev/null 2>&1"]
                periodSeconds: 30
                failureThreshold: 5
                timeoutSeconds: 5
    EOF
  register: temporal_deploy_result

- name: Wait for Temporal ready
  shell: >
    kubectl wait --for=condition=available deploy/temporal
    -n katonic-infra
    --timeout=300s
  retries: 3
  delay: 15

- name: Display Temporal status
  debug:
    msg: "Temporal deployed at {{ temporal_host }}:{{ temporal_port }} (namespace={{ temporal_namespace }}, queue={{ temporal_task_queue }})"
