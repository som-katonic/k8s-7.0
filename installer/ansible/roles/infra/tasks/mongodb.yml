# ============================================================================
# Infra Role - MongoDB (ACE BFF Document Store)
# ============================================================================
# Used by: ace-bff (chat sessions, agent state, memories, artifacts)
# ============================================================================

- name: Add Bitnami Helm repo (if not already added)
  shell: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update
  ignore_errors: true

- name: Generate MongoDB root password
  shell: openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24
  register: mongo_password_gen
  no_log: true

- name: Set MongoDB facts
  set_fact:
    mongodb_host: "mongodb.katonic-infra.svc.cluster.local"
    mongodb_port: "27017"
    mongodb_database: "katonic"
    mongodb_password: "{{ mongo_password_gen.stdout }}"
  no_log: true

- name: Deploy MongoDB
  shell: >
    helm upgrade --install mongodb bitnami/mongodb
    --namespace katonic-infra
    --set auth.rootPassword={{ mongodb_password }}
    --set auth.databases[0]={{ mongodb_database }}
    --set architecture={{ 'replicaset' if (mongodb_replicas | default(1) | int) > 1 else 'standalone' }}
    --set replicaCount={{ mongodb_replicas | default(1) }}
    --set persistence.size={{ mongodb_storage_size | default('20Gi') }}
    --set resources.requests.memory=512Mi
    --set resources.requests.cpu=250m
    --set resources.limits.memory=2Gi
    --set resources.limits.cpu=1
    --wait --timeout 10m
  no_log: true

- name: Wait for MongoDB ready
  shell: >
    kubectl wait --for=condition=ready pod
    -l app.kubernetes.io/name=mongodb
    -n katonic-infra
    --timeout=300s
  retries: 3
  delay: 15

- name: Set MongoDB connection URL fact
  set_fact:
    mongodb_url: "mongodb://root:{{ mongodb_password }}@{{ mongodb_host }}:{{ mongodb_port }}/{{ mongodb_database }}?authSource=admin"
  no_log: true

- name: Display MongoDB status
  debug:
    msg: "MongoDB deployed at {{ mongodb_host }}:{{ mongodb_port }}/{{ mongodb_database }}"
