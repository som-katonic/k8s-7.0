# ============================================================================
# Infra Role - Cloud Object Storage (AWS S3)
# ============================================================================
# No deployment needed. Just set facts for tenant-manager.
# S3 buckets are created by tenant-manager per-org.
# ============================================================================

- name: Set S3 object storage facts
  set_fact:
    object_storage_type: "s3"
    object_storage_endpoint: "https://s3.{{ aws_region }}.amazonaws.com"
    object_storage_region: "{{ aws_region }}"
    object_storage_bucket_prefix: "{{ s3_bucket_prefix | default('katonic') }}"
    # Access via IAM role (IRSA) or env vars
    object_storage_access_key: "{{ aws_access_key | default('') }}"
    object_storage_secret_key: "{{ aws_secret_key | default('') }}"
  no_log: true

- name: Display S3 configuration
  debug:
    msg: "Object storage: AWS S3 (region: {{ aws_region }}, prefix: {{ object_storage_bucket_prefix }})"
