# ============================================================================
# Infra Role - Redis
# ============================================================================

- name: Generate Redis password
  shell: openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24
  register: redis_password_gen
  no_log: true

- name: Set Redis facts
  set_fact:
    redis_password: "{{ redis_password_gen.stdout }}"
    redis_host: "redis-master.katonic-infra.svc.cluster.local"
    redis_port: "6379"
  no_log: true

- name: Deploy Redis
  shell: >
    helm upgrade --install redis bitnami/redis
    --namespace katonic-infra
    --set auth.password={{ redis_password }}
    --set master.persistence.size={{ redis_storage_size | default('10Gi') }}
    --set replica.replicaCount={{ (redis_replicas | default(1) | int) - 1 if (redis_replicas | default(1) | int) > 1 else 0 }}
    --set architecture={{ 'replication' if (redis_replicas | default(1) | int) > 1 else 'standalone' }}
    --set master.resources.requests.memory=256Mi
    --set master.resources.requests.cpu=100m
    --wait --timeout 10m

- name: Wait for Redis ready
  shell: >
    kubectl wait --for=condition=ready pod
    -l app.kubernetes.io/name=redis
    -n katonic-infra
    --timeout=300s
  retries: 3
  delay: 15

- name: Display Redis status
  debug:
    msg: "Redis deployed at {{ redis_host }}:{{ redis_port }}"
