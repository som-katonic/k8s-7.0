# ============================================================================
# Infra Role - Cloud Object Storage (Azure Blob Storage)
# ============================================================================

- name: Set Azure Blob storage facts
  set_fact:
    object_storage_type: "azure-blob"
    object_storage_endpoint: "https://{{ azure_storage_account | default('katonicdata') }}.blob.core.windows.net"
    object_storage_account: "{{ azure_storage_account | default('katonicdata') }}"
    object_storage_access_key: "{{ azure_storage_key | default('') }}"
  no_log: true

- name: Display Azure Blob configuration
  debug:
    msg: "Object storage: Azure Blob (account: {{ object_storage_account }})"
