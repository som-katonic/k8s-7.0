# ============================================================================
# Infra Role - Cloud Object Storage (OCI - S3-compatible)
# ============================================================================

- name: Set OCI Object Storage facts
  set_fact:
    object_storage_type: "s3"
    object_storage_endpoint: "https://{{ oci_namespace | default('') }}.compat.objectstorage.{{ oci_region }}.oraclecloud.com"
    object_storage_region: "{{ oci_region }}"
    object_storage_bucket_prefix: "{{ oci_bucket_prefix | default('katonic') }}"
    object_storage_access_key: "{{ oci_s3_access_key | default('') }}"
    object_storage_secret_key: "{{ oci_s3_secret_key | default('') }}"
  no_log: true

- name: Display OCI Object Storage configuration
  debug:
    msg: "Object storage: OCI Object Storage (S3-compatible, region: {{ oci_region }})"
