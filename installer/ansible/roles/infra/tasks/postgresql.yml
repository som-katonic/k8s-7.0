# ============================================================================
# Infra Role - PostgreSQL (In-Cluster)
# ============================================================================
# Deploys PostgreSQL as a StatefulSet using Bitnami Helm chart.
# ============================================================================


- name: Generate PostgreSQL password
  shell: |
    openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24
  register: pg_password_gen
  no_log: true

- name: Set PostgreSQL credentials
  set_fact:
    pg_password: "{{ pg_password_gen.stdout }}"
    pg_host: "postgresql.katonic-infra.svc.cluster.local"
    pg_port: "5432"
    pg_database: "katonic"
    pg_user: "katonic"
  no_log: true

- name: Add Bitnami Helm repo
  shell: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update
  ignore_errors: true

- name: Deploy PostgreSQL
  shell: >
    helm upgrade --install postgresql bitnami/postgresql
    --namespace katonic-infra
    --set auth.username={{ pg_user }}
    --set auth.password={{ pg_password }}
    --set auth.database={{ pg_database }}
    --set primary.persistence.size={{ postgres_storage_size | default('50Gi') }}
    --set primary.resources.requests.memory=1Gi
    --set primary.resources.requests.cpu=500m
    --set primary.resources.limits.memory=4Gi
    --set primary.resources.limits.cpu=2
    --set architecture={{ 'replication' if (postgres_replicas | default(1) | int) > 1 else 'standalone' }}
    --set readReplicas.replicaCount={{ (postgres_replicas | default(1) | int) - 1 if (postgres_replicas | default(1) | int) > 1 else 0 }}
    --wait --timeout 10m

- name: Wait for PostgreSQL ready
  shell: >
    kubectl wait --for=condition=ready pod
    -l app.kubernetes.io/name=postgresql
    -n katonic-infra
    --timeout=300s
  retries: 3
  delay: 30

- name: Store PostgreSQL connection string in facts
  set_fact:
    db_connection_string: "postgresql://{{ pg_user }}:{{ pg_password }}@{{ pg_host }}:{{ pg_port }}/{{ pg_database }}"
    db_host: "{{ pg_host }}"
    db_port: "{{ pg_port }}"
    db_name: "{{ pg_database }}"
    db_user: "{{ pg_user }}"
    db_password: "{{ pg_password }}"
  no_log: true

- name: Display PostgreSQL status
  debug:
    msg: "PostgreSQL deployed at {{ pg_host }}:{{ pg_port }}/{{ pg_database }}"

- name: Create keycloak database
  shell: |
    kubectl run pg-create-kcdb --rm -i --restart=Never \
      --namespace katonic-infra \
      --image=bitnami/postgresql:latest \
      --env="PGPASSWORD={{ pg_password }}" \
      -- psql -h {{ pg_host }} -U {{ pg_user }} -d {{ pg_database }} \
      -c "SELECT 'CREATE DATABASE keycloak' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec"
  no_log: true
  retries: 3
  delay: 10
  ignore_errors: true
