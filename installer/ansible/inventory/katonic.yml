# ============================================================================
# Katonic AI Platform v7.0 - Installer Configuration
# ============================================================================
# Fill in the values below before running the installer.
# Lines starting with # are comments and can be left as-is.
# ============================================================================

# ----------------------------------------------------------------------------
# PLATFORM VERSION
# ----------------------------------------------------------------------------
platform_version: "7.0.0"

# ----------------------------------------------------------------------------
# CLOUD PROVIDER
# ----------------------------------------------------------------------------
# Options: AWS | Azure | GCP | OCI | Alibaba | SCCC | On-Premise
deploy_on: AWS

# Create a new K8s cluster or connect to existing?
# Set to False if you have an existing EKS/AKS/GKE/OKE/ACK cluster.
create_k8s_cluster: True

# Cluster name (max 30 characters, lowercase alphanumeric + hyphens)
cluster_name: katonic-platform-v7

# ----------------------------------------------------------------------------
# CLOUD CREDENTIALS (fill in section matching your deploy_on)
# ----------------------------------------------------------------------------

# -- AWS --
aws_region: us-east-1
eks_version: "1.30"
# aws_access_key and aws_secret_key are read from environment or ~/.aws/credentials

# -- Azure --
# azure_subscription_id:
# azure_resource_group:
# azure_location: eastus
# aks_version: "1.30"

# -- GCP --
# gcp_project_id:
# gcp_region: us-central1
# gke_version: "1.30"

# -- OCI (Oracle Cloud) --
# oci_tenancy_ocid:
# oci_compartment_ocid:
# oci_region: us-ashburn-1
# oke_version: "v1.30.1"

# -- Alibaba Cloud --
# alibaba_region: cn-hangzhou
# alibaba_access_key:
# alibaba_secret_key:
# ack_version: "1.30.1-aliyun.1"

# -- SCCC (Saudi Cloud - uses Alibaba APIs with Saudi endpoints) --
# When deploy_on = SCCC, the following are auto-set:
#   alibaba_region: me-riyadh
#   alibaba_endpoint: https://ecs.me-riyadh.alibabacloudsa.com
#   data_residency: saudi-arabia

# -- On-Premise --
# No cloud credentials needed. Ensure kubectl is configured.

# ----------------------------------------------------------------------------
# NODE POOLS
# ----------------------------------------------------------------------------
platform_nodes:
  instance_type: m5.2xlarge        # AWS default. Adjust per cloud.
  min_count: 3
  max_count: 6
  os_disk_size: 128

compute_nodes:
  instance_type: m5.4xlarge
  min_count: 2
  max_count: 8
  os_disk_size: 128

vectordb_nodes:
  instance_type: m5.2xlarge
  min_count: 1
  max_count: 4
  os_disk_size: 128

# ----------------------------------------------------------------------------
# GPU
# ----------------------------------------------------------------------------
gpu_enabled: False

gpu_nodes:
  instance_type: p4d.24xlarge      # AWS: p4d/p5, Azure: NC/ND, GCP: A2/G2
  min_count: 0                     # OCI: BM.GPU, Alibaba/SCCC: ecs.gn7
  max_count: 2
  os_disk_size: 256

# ----------------------------------------------------------------------------
# DATABASE
# ----------------------------------------------------------------------------
# Options: in-cluster | managed
# in-cluster: PostgreSQL deployed as StatefulSet inside K8s (default, good for dev/pilot/air-gap)
# managed: Uses cloud-managed PostgreSQL (RDS, Azure DB, Cloud SQL, OCI PG, ApsaraDB)
database_mode: in-cluster

# Only required if database_mode = managed
# managed_db_host:
# managed_db_port: 5432
# managed_db_name: katonic
# managed_db_user: katonic
# managed_db_password:
# managed_db_ssl: True

# In-cluster PostgreSQL settings
postgres_storage_size: 50Gi
postgres_replicas: 1               # Set to 2+ for HA

# ----------------------------------------------------------------------------
# OBJECT STORAGE
# ----------------------------------------------------------------------------
# Options: auto | minio
# auto: Uses cloud-native storage (S3, Blob, GCS, OCI Object Storage, OSS)
#        Falls back to MinIO for On-Premise and air-gap.
# minio: Forces MinIO everywhere.
object_storage_mode: auto

# Only required if object_storage_mode = auto and deploy_on = AWS
# s3_bucket_prefix: katonic         # Buckets created as: katonic-<org-slug>-data

# Only required if object_storage_mode = minio or deploy_on = On-Premise
minio_storage_size: 250Gi

# ----------------------------------------------------------------------------
# MILVUS (Vector Database)
# ----------------------------------------------------------------------------
# Options: standalone | distributed
# standalone: Single pod, good for most deployments (default)
# distributed: Multi-node with etcd + Pulsar, for large-scale knowledge bases
milvus_mode: standalone
milvus_storage_size: 128Gi

# ----------------------------------------------------------------------------
# DOMAIN & DNS
# ----------------------------------------------------------------------------
use_custom_domain: False
custom_domain_name:

# Katonic-managed domain (*.katonic.ai)
use_katonic_domain: True
katonic_domain_prefix: mycompany    # Result: mycompany.katonic.ai

# Internal load balancer (no public IP)
internal_loadbalancer: False

# ----------------------------------------------------------------------------
# TLS CERTIFICATES
# ----------------------------------------------------------------------------
# Options: auto | custom
# auto: cert-manager generates Let's Encrypt certs
# custom: Provide your own TLS cert and key
tls_mode: auto

# Only required if tls_mode = custom
# tls_cert_path: /path/to/tls.crt
# tls_key_path: /path/to/tls.key

# ----------------------------------------------------------------------------
# ADMIN USER
# ----------------------------------------------------------------------------
admin_email: admin@example.com
admin_first_name: Platform
admin_last_name: Admin
# Note: Password is auto-generated by tenant-manager and emailed to admin.
# No adminPassword field needed in v7.

# ----------------------------------------------------------------------------
# LICENSE
# ----------------------------------------------------------------------------
# Path to the license file provided by Katonic sales.
# For demo/pilot: obtain from your Solutions Engineer.
license_file_path: /inventory/license.json

# ----------------------------------------------------------------------------
# CONTAINER REGISTRY
# ----------------------------------------------------------------------------
# Default: quay.io/katonic (Katonic's public registry)
# For air-gap: set to your private registry
image_registry: quay.io/katonic

# Private registry auth (for air-gap or custom registries)
custom_registry: False
# registry_username:
# registry_password:

# ----------------------------------------------------------------------------
# MONITORING
# ----------------------------------------------------------------------------
enable_monitoring: True             # Prometheus + Grafana stack

# ----------------------------------------------------------------------------
# BACKUP
# ----------------------------------------------------------------------------
backup_enabled: True

# ----------------------------------------------------------------------------
# KUBERNETES OPERATORS (per-org database isolation)
# ----------------------------------------------------------------------------
cnpg_version: "0.22.0"                 # CloudNativePG operator chart version
mongodb_operator_version: "0.10.0"     # MongoDB Community Operator chart version
milvus_operator_version: "1.1.2"       # Milvus Operator chart version

# Per-org database sizing (applied to every new org)
org_postgres_instances: 2              # 1=dev, 2=HA production
org_postgres_storage: "50Gi"
org_mongodb_members: 3                 # 1=dev, 3=replica set production
org_milvus_storage: "50Gi"
org_milvus_mode: "standalone"          # standalone | distributed
# backup_schedule: "0 0 * * *"     # Daily at midnight
# backup_retention: 2160h0m0s      # 90 days

# Only for AWS
backup_s3_bucket: ""   # REQUIRED when backup_enabled: True — e.g. "katonic-backups-prod"
# backup_s3_region:

# ----------------------------------------------------------------------------
# NETWORKING
# ----------------------------------------------------------------------------
# Private cluster (no public API endpoint)
private_cluster: False

# Pod CIDR (override if conflicts with existing network)
# pod_cidr: 10.244.0.0/16
# service_cidr: 10.96.0.0/12

# ----------------------------------------------------------------------------
# SMTP (for admin email notifications)
# ----------------------------------------------------------------------------
custom_smtp: False
# smtp_host:
# smtp_port: 587
# smtp_user:
# smtp_password:
# smtp_from: noreply@katonic.ai

# ----------------------------------------------------------------------------
# AIR-GAP MODE
# ----------------------------------------------------------------------------
air_gap: False
# When True:
#   - All images loaded from airgap/images.tar.gz into private registry
#   - No external network calls
#   - database_mode forced to in-cluster
#   - object_storage_mode forced to minio
#   - tls_mode forced to custom (no Let's Encrypt)

# ----------------------------------------------------------------------------
# PRE-FLIGHT CHECKS
# ----------------------------------------------------------------------------
enable_pre_checks: True

# ----------------------------------------------------------------------------
# VARIANT SIZING GUIDE
# ----------------------------------------------------------------------------
# The license file determines which variant is active (Enterprise, Distributor,
# Gov). The installer doesn't need to know the variant, but infrastructure
# should be sized appropriately.
#
# Demo/Pilot:
#   platform_nodes: 3x m5.xlarge, compute_nodes: 2x m5.2xlarge
#   database_mode: in-cluster, milvus_mode: standalone
#   postgres_replicas: 1, keycloak_replicas: 1
#
# Enterprise (single org, production):
#   platform_nodes: 3x m5.2xlarge, compute_nodes: 3x m5.4xlarge
#   database_mode: managed (recommended), milvus_mode: standalone
#   postgres_replicas: 2, keycloak_replicas: 2
#
# Distributor (multi-org):
#   platform_nodes: 5x m5.2xlarge, compute_nodes: 5x m5.4xlarge
#   database_mode: managed (required), milvus_mode: distributed (recommended)
#   postgres_replicas: 3, keycloak_replicas: 3, redis_replicas: 3
#   use_custom_domain: True (wildcard cert recommended for *.yourdomain.com)
#
# Gov (compliance + air-gap):
#   Same as Enterprise, plus:
#   air_gap: True, tls_mode: custom, deploy_on: On-Premise
#

# ----------------------------------------------------------------------------
# MULTI-TENANCY (Distributor variant)
# ----------------------------------------------------------------------------
# These settings only matter if your license is Distributor (multi-org).
# For Enterprise/Gov/Demo/Pilot, leave defaults.

# Maximum number of organizations (0 = no limit, determined by license)
max_organizations: 0

# Per-org namespace prefix (orgs get: katonic-<prefix>-<org-slug>)
org_namespace_prefix: org

# Enable wildcard domain for multi-org routing
# Each org gets: <org-slug>.<platform_domain>
# Requires wildcard TLS cert (*.yourdomain.com)
wildcard_domain: False

# Per-org resource isolation
# strict: hard resource quotas per org (CPU, memory, GPU, storage)
# soft: resource requests only, no hard limits
# none: no isolation (shared pool)
org_resource_isolation: strict

# ----------------------------------------------------------------------------
# ADVANCED (usually leave defaults)
# ----------------------------------------------------------------------------
# Keycloak
keycloak_replicas: 1               # Set to 2+ for HA

# Redis
redis_storage_size: 10Gi
redis_replicas: 1

# Istio
istio_version: "1.22"

# Autoscaler (cloud clusters)
autoscaler_enable: True

# ----------------------------------------------------------------------------
# ON-PREMISE / BARE METAL
# ----------------------------------------------------------------------------
# These settings only apply when deploy_on = On-Premise.
# The customer provides an existing K8s cluster (e.g. RKE2 on SUSE).

# Storage provider for PersistentVolumes
# auto: Detect existing StorageClass (Nutanix CSI, vSphere CSI, Portworx, etc.)
# longhorn: Distributed block storage (good for bare-metal without existing CSI)
# local-path: Local node storage (simple, non-HA)
# existing: Customer has already configured a default StorageClass
storage_provider: auto

# MetalLB IP address pool for LoadBalancer services
# Required for on-prem since there's no cloud LB.
# Must be IPs in the same subnet as worker nodes, not already in use.
metallb_address_pool: "10.0.0.200-10.0.0.210"

# Set to True if customer already has a LoadBalancer solution (e.g. F5, HAProxy)
skip_metallb: False
