# Multi-Tenant (Cloud/Distributor) Overrides
# Usage: helm install -f values.yaml -f values-cloud.yaml katonic-platform .

global:
  deploymentMode: "cloud"

# Scale generic services
services:
  agent-api:
    replicas: 3
    resources:
      requests: { cpu: "1", memory: 2Gi }
      limits: { cpu: "4", memory: 4Gi }
  agent-runtime:
    replicas: 3
    resources:
      requests: { cpu: "2", memory: 4Gi }
      limits: { cpu: "8", memory: 8Gi }
  ai-gateway:
    replicas: 3
  employee-workspace:
    replicas: 3

  distributor-console:
    enabled: true
    replicas: 2

# Scale subcharts
tenantManager:
  replicas: 2
  config:
    deploymentMode: "cloud"
    multiTenancy:
      maxOrgs: 50
      maxEnvironmentsPerOrg: 3
      maxUsersPerOrg: 500

aceBff:
  replicas: 3
