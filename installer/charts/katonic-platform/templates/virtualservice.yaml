{{- if .Values.gateway.enabled }}
{{- $ns := include "katonic.namespace" . }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: katonic-platform
  namespace: {{ $ns }}
  labels:
    {{- include "katonic.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.global.domain | quote }}
    {{- if .Values.gateway.wildcardDomain }}
    - "*.{{ .Values.global.domain }}"
    {{- end }}
  gateways:
    - katonic-gateway
  http:
    # ----------------------------------------------------------------
    # Backend API routes (path prefix -> service, strip prefix)
    # ----------------------------------------------------------------
    - match:
        - uri:
            prefix: /api/admin/
      rewrite:
        uri: /
      route:
        - destination:
            host: admin-api.{{ $ns }}.svc.cluster.local
            port:
              number: 8004

    - match:
        - uri:
            prefix: /api/obs/
      rewrite:
        uri: /
      route:
        - destination:
            host: observability.{{ $ns }}.svc.cluster.local
            port:
              number: 8005

    - match:
        - uri:
            prefix: /api/ge/
      rewrite:
        uri: /
      route:
        - destination:
            host: guardrails-engine.{{ $ns }}.svc.cluster.local
            port:
              number: 8006

    - match:
        - uri:
            prefix: /api/gp/
      rewrite:
        uri: /
      route:
        - destination:
            host: governance-proxy.{{ $ns }}.svc.cluster.local
            port:
              number: 8003

    - match:
        - uri:
            prefix: /api/agent/
      rewrite:
        uri: /
      route:
        - destination:
            host: agent-api.{{ $ns }}.svc.cluster.local
            port:
              number: 8007

    - match:
        - uri:
            prefix: /api/runtime/
      rewrite:
        uri: /
      route:
        - destination:
            host: agent-runtime.{{ $ns }}.svc.cluster.local
            port:
              number: 8008

    - match:
        - uri:
            prefix: /api/mcp/
      rewrite:
        uri: /
      route:
        - destination:
            host: mcp-gateway.{{ $ns }}.svc.cluster.local
            port:
              number: 8009

    - match:
        - uri:
            prefix: /api/llm/
      rewrite:
        uri: /
      route:
        - destination:
            host: ai-gateway.{{ $ns }}.svc.cluster.local
            port:
              number: 8010

    - match:
        - uri:
            prefix: /api/ke/
      rewrite:
        uri: /
      route:
        - destination:
            host: knowledge-engine.{{ $ns }}.svc.cluster.local
            port:
              number: 8011

    - match:
        - uri:
            prefix: /api/mds/
      rewrite:
        uri: /
      route:
        - destination:
            host: model-deployment-service.{{ $ns }}.svc.cluster.local
            port:
              number: 8012

    - match:
        - uri:
            prefix: /api/ws/
      rewrite:
        uri: /
      route:
        - destination:
            host: workspace-service.{{ $ns }}.svc.cluster.local
            port:
              number: 8013

    - match:
        - uri:
            prefix: /api/rc/
      rewrite:
        uri: /
      route:
        - destination:
            host: remote-connections.{{ $ns }}.svc.cluster.local
            port:
              number: 8014

    - match:
        - uri:
            prefix: /api/eval/
      rewrite:
        uri: /
      route:
        - destination:
            host: eval-engine.{{ $ns }}.svc.cluster.local
            port:
              number: 8015

    # ----------------------------------------------------------------
    # Public API Gateway (external developer API, kapi_ auth)
    # Auth handled downstream — no Keycloak JWT required here
    # ----------------------------------------------------------------
    - match:
        - uri:
            prefix: /public/v1/
      route:
        - destination:
            host: public-api-gateway.{{ $ns }}.svc.cluster.local
            port:
              number: 8016

    # ----------------------------------------------------------------
    # Katonic MCP Server (external MCP protocol, kapi_ auth)
    # ----------------------------------------------------------------
    - match:
        - uri:
            prefix: /mcp
      route:
        - destination:
            host: katonic-mcp-server.{{ $ns }}.svc.cluster.local
            port:
              number: 8017

    - match:
        - uri:
            prefix: /api/tm/
      rewrite:
        uri: /
      route:
        - destination:
            host: tenant-manager.{{ $ns }}.svc.cluster.local
            port:
              number: 8015

    # ----------------------------------------------------------------
    # Tenant-manager direct API (used by distributor-console nginx)
    # ----------------------------------------------------------------
    - match:
        - uri:
            prefix: /api/v1/
      route:
        - destination:
            host: tenant-manager.{{ $ns }}.svc.cluster.local
            port:
              number: 8015

    # ----------------------------------------------------------------
    # ACE BFF WebSocket + HTTP (used by employee-workspace)
    # ----------------------------------------------------------------
    - match:
        - uri:
            prefix: /socket.io/
      route:
        - destination:
            host: ace-bff.{{ $ns }}.svc.cluster.local
            port:
              number: 3002
      timeout: 3600s

    - match:
        - uri:
            prefix: /bff/
      rewrite:
        uri: /
      route:
        - destination:
            host: ace-bff.{{ $ns }}.svc.cluster.local
            port:
              number: 3002

    # ----------------------------------------------------------------
    # Legacy platform API paths (model deployment, notebooks)
    # ----------------------------------------------------------------
    - match:
        - uri:
            prefix: /platform/api/
      route:
        - destination:
            host: model-deployment-service.{{ $ns }}.svc.cluster.local
            port:
              number: 8012

    # ----------------------------------------------------------------
    # Prometheus metrics (for distributor dashboard)
    # ----------------------------------------------------------------
    - match:
        - uri:
            prefix: /api/prom/
      rewrite:
        uri: /api/v1/
      route:
        - destination:
            host: prometheus-kube-prometheus-prometheus.katonic-monitoring.svc.cluster.local
            port:
              number: 9090

    # ----------------------------------------------------------------
    # Frontend routes
    # ----------------------------------------------------------------
    - match:
        - uri:
            prefix: /distributor
      route:
        - destination:
            host: distributor-console.{{ $ns }}.svc.cluster.local
            port:
              number: 3020

    - match:
        - uri:
            prefix: /workspace
      route:
        - destination:
            host: employee-workspace.{{ $ns }}.svc.cluster.local
            port:
              number: 3010

    - match:
        - uri:
            prefix: /studio
      route:
        - destination:
            host: agent-studio.{{ $ns }}.svc.cluster.local
            port:
              number: 3001

    # ----------------------------------------------------------------
    # Default: ops-console (RUN dashboard)
    # ----------------------------------------------------------------
    - route:
        - destination:
            host: ops-console.{{ $ns }}.svc.cluster.local
            port:
              number: 3000
{{- end }}
