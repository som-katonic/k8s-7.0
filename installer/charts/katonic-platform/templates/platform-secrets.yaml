apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: {{ include "katonic.namespace" . }}
  labels:
    {{- include "katonic.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database password — injected so services can build authenticated connection strings
  POSTGRES_PASSWORD: {{ .Values.global.postgresql.password | default "" | quote }}
  # ClickHouse password
  CLICKHOUSE_PASSWORD: {{ .Values.global.clickhouse.password | default "" | quote }}
---
{{- if .Values.global.postgresql.existingSecret }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: platform-db-credentials
  namespace: {{ include "katonic.namespace" . }}
type: Opaque
stringData:
  password: {{ required "PostgreSQL password required" .Values.global.postgresql.password | quote }}
{{- end }}
---
{{- if .Values.global.redis.existingSecret }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: platform-redis-credentials
  namespace: {{ include "katonic.namespace" . }}
type: Opaque
stringData:
  password: {{ .Values.global.redis.password | default "" | quote }}
{{- end }}
---
{{- if .Values.global.keycloak.existingSecret }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: platform-keycloak-credentials
  namespace: {{ include "katonic.namespace" . }}
type: Opaque
stringData:
  admin-password: {{ required "Keycloak admin password required" .Values.global.keycloak.adminPassword | quote }}
{{- end }}
---
{{- if .Values.global.objectStorage.existingSecret }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: platform-minio-credentials
  namespace: {{ include "katonic.namespace" . }}
type: Opaque
stringData:
  access-key: {{ .Values.global.objectStorage.accessKey | default "minioadmin" | quote }}
  secret-key: {{ .Values.global.objectStorage.secretKey | default "minioadmin" | quote }}
{{- end }}
