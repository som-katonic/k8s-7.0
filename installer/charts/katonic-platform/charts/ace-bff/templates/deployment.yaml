apiVersion: apps/v1
kind: Deployment
metadata:
  name: ace-bff
  namespace: {{ include "katonic.namespace" $ }}
  labels:
    app.kubernetes.io/name: ace-bff
    {{- include "katonic.labels" $ | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ace-bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ace-bff
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ace-bff
          image: "{{ include "katonic.imageRegistry" $ }}/{{ .Values.image }}:{{ include "katonic.imageTag" $ }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
                optional: true
          env:
            - name: SERVICE_NAME
              value: "ace-bff"
            - name: PORT
              value: {{ .Values.port | quote }}
            - name: WS_PING_INTERVAL
              value: {{ .Values.websocket.pingInterval | quote }}
            - name: WS_PING_TIMEOUT
              value: {{ .Values.websocket.pingTimeout | quote }}
            - name: WS_MAX_PAYLOAD
              value: {{ .Values.websocket.maxPayload | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
