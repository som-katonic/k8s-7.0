{{/* Istio DestinationRule for sticky sessions (Socket.IO requires it) */}}
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ace-bff-sticky
  namespace: {{ include "katonic.namespace" $ }}
spec:
  host: ace-bff.{{ include "katonic.namespace" $ }}.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      consistentHash:
        httpCookie:
          name: io
          ttl: 0s
