apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: tenant-manager
    app.kubernetes.io/version: {{ .Values.config.platformVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tenant-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenant-manager
        app.kubernetes.io/version: {{ .Values.config.platformVersion | quote }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: tenant-manager
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8015
              name: http
              protocol: TCP
          env:
            # ---- Service Config (TM_ prefix per config.py) ----
            - name: TM_PORT
              value: "8015"
            - name: TM_ENVIRONMENT
              value: "production"
            - name: TM_DEPLOYMENT_MODE
              value: {{ .Values.config.deploymentMode | default "platform" | quote }}
            - name: TM_ADMIN_EMAIL
              value: {{ .Values.config.adminEmail | quote }}
            - name: TM_AUTO_BOOTSTRAP
              value: "true"
            - name: TM_LOG_LEVEL
              value: "INFO"
            - name: TM_LICENSE_PUBLIC_KEY_PATH
              value: "/etc/katonic/license.json"

            # ---- Platform metadata (non-prefixed, read by bootstrap) ----
            - name: PLATFORM_VERSION
              value: {{ .Values.config.platformVersion | quote }}
            - name: PLATFORM_DOMAIN
              value: {{ .Values.config.domain | quote }}
            - name: CLOUD_PROVIDER
              value: {{ .Values.config.cloudProvider | quote }}
            - name: IMAGE_REGISTRY
              value: {{ .Values.config.imageRegistry | quote }}

            # ---- Multi-tenancy ----
            - name: TM_MAX_ORGANIZATIONS
              value: {{ .Values.config.multiTenancy.maxOrganizations | quote }}
            - name: TM_ORG_NAMESPACE_PREFIX
              value: {{ .Values.config.multiTenancy.orgNamespacePrefix | quote }}
            - name: TM_WILDCARD_DOMAIN
              value: {{ .Values.config.multiTenancy.wildcardDomain | quote }}
            - name: TM_RESOURCE_ISOLATION
              value: {{ .Values.config.multiTenancy.resourceIsolation | quote }}

            # ---- Database (TM_POSTGRES_URL from Secret) ----
            - name: TM_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.db }}
                  key: connection-string

            # ---- Keycloak (TM_ prefixed) ----
            - name: TM_KEYCLOAK_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.keycloak }}
                  key: url
            - name: TM_KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.keycloak }}
                  key: admin-user
            - name: TM_KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.keycloak }}
                  key: admin-password

            # ---- Redis (TM_ prefixed) ----
            - name: TM_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis }}
                  key: url

            # ---- Object Storage ----
            - name: TM_OBJECT_STORAGE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.objectStorage }}
                  key: endpoint
            - name: TM_OBJECT_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.objectStorage }}
                  key: access-key
            - name: TM_OBJECT_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.objectStorage }}
                  key: secret-key

            # ---- Telemetry ----
            - name: OTEL_ENABLED
              value: "true"

            {{- if .Values.smtp.enabled }}
            # ---- SMTP ----
            - name: TM_SMTP_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: TM_SMTP_PORT
              value: {{ .Values.smtp.port | quote }}
            - name: TM_SMTP_USER
              value: {{ .Values.smtp.user | quote }}
            - name: TM_SMTP_PASSWORD
              value: {{ .Values.smtp.password | quote }}
            - name: TM_SMTP_FROM
              value: {{ .Values.smtp.from | quote }}
            {{- end }}

          volumeMounts:
            - name: license
              mountPath: /etc/katonic
              readOnly: true

          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        - name: license
          configMap:
            name: {{ .Values.secrets.license }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
