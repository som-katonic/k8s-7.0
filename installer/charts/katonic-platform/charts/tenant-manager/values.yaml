# ============================================================================
# Tenant-Manager Helm Chart - Default Values
# ============================================================================

replicaCount: 1

image:
  registry: registry.katonic.ai
  repository: tenant-manager
  tag: "7.0.0"
  pullPolicy: IfNotPresent

# Platform configuration (passed from installer)
config:
  platformVersion: "7.0.0"
  deploymentMode: "platform"       # platform (single-tenant) or cloud (multi-tenant)
  adminEmail: ""
  adminFirstName: "Platform"
  adminLastName: "Admin"
  domain: "platform.katonic.ai"
  cloudProvider: "AWS"
  milvusMode: "standalone"
  gpuEnabled: false
  imageRegistry: "quay.io/katonic"
  objectStorageType: "minio"
  multiTenancy:
    maxOrganizations: 0              # 0 = determined by license
    orgNamespacePrefix: "org"
    wildcardDomain: false
    resourceIsolation: "strict"      # strict | soft | none

# K8s secret names (created by installer, referenced by tenant-manager)
secrets:
  db: tenant-manager-db
  keycloak: tenant-manager-keycloak
  redis: tenant-manager-redis
  objectStorage: tenant-manager-object-storage
  license: tenant-manager-license

# SMTP configuration (optional)
smtp:
  enabled: false
  host: ""
  port: 587
  user: ""
  password: ""
  from: "noreply@katonic.ai"

# Service
service:
  type: ClusterIP
  port: 8015

# Resources
resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 2Gi
    cpu: 1

# Health checks
livenessProbe:
  httpGet:
    path: /healthz
    port: 8015
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: 8015
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5

# Service account
serviceAccount:
  create: true
  name: tenant-manager
  # Annotations for cloud IAM (IRSA, Workload Identity, etc.)
  annotations: {}

# RBAC - tenant-manager needs cluster-wide permissions to create namespaces,
# deploy Helm charts, and manage platform services
rbac:
  create: true

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Pod annotations
podAnnotations: {}
