# Per-tenant chart values.
# tenant-manager passes these when running: helm install tenant-{slug} katonic-tenant/
global:
  imageRegistry: "registry.katonic.ai"
  imageTag: "7.0.0"
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

tenant:
  orgSlug: ""          # e.g. "acme"
  orgId: ""            # e.g. "uuid"
  environment: "prod"  # dev | test | prod
  namespace: ""        # auto: tenant-{orgSlug}-{environment}

# Resource quotas per tenant namespace
resourceQuota:
  enabled: true
  cpu: "16"
  memory: "32Gi"
  gpu: "0"          # nvidia.com/gpu — set by quota engine based on allocation
  pods: "50"
  services: "20"
  persistentvolumeclaims: "10"

# Limit ranges for individual pods
limitRange:
  enabled: true
  defaultCpu: "500m"
  defaultMemory: "512Mi"
  maxCpu: "4"
  maxMemory: "8Gi"

# NetworkPolicy: isolate tenant namespace
networkPolicy:
  enabled: true

# Per-tenant agent-runtime (runs agent executions)
agentRuntime:
  enabled: true
  replicas: 1
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: "2", memory: 4Gi }

# Per-tenant MCP server sidecar pool
mcpPool:
  enabled: false
  maxContainers: 10

# ── Per-org dedicated databases (Option A — physical isolation) ──────────── #
# Operators must be installed cluster-wide before any org is provisioned.
# Set enabled: false for dev/single-node environments using shared databases.
databases:
  postgres:
    enabled: true
    instances: 2          # 2 = primary + 1 replica (HA). Use 1 for dev.
    storageSize: 50Gi
    backupBucket: ""      # e.g. "s3://katonic-backups" — empty disables WAL archiving

  mongodb:
    enabled: true
    members: 3            # 3 = standard replica set. Use 1 for dev.
    version: "7.0.2"

  milvus:
    enabled: true
    mode: standalone      # standalone | distributed
    storageSize: 50Gi
