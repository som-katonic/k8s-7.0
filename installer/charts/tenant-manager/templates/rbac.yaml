{{- if .Values.rbac.create }}
# Tenant-manager ClusterRole — narrowed to methods that exist in k8s.py (Decision 6).
# Removed: daemonsets, roles/bindings, ingresses, networkpolicies, istio gateways/destinationrules,
#           limitranges, events, persistentvolumes. All corresponding k8s.py wrapper methods deleted.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-manager
  labels:
    app.kubernetes.io/name: tenant-manager
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Secrets (create_secret, read_secret, delete_secret + delete_all_workloads)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Resource quotas (create/patch/read/delete_resource_quota)
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # delete_all_workloads: configmaps, services, serviceaccounts, pods, pvcs
  - apiGroups: [""]
    resources: ["configmaps", "services", "serviceaccounts", "pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "delete"]

  # delete_all_workloads: deployments, statefulsets, replicasets
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "delete"]

  # delete_all_workloads: jobs, cronjobs
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "delete"]

  # delete_all_workloads: HPA
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "delete"]

  # delete_all_workloads: PDB
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "delete"]

  # Node info + GPU taint management (list_nodes, read_node, patch_node)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]

  # Istio — virtualservices only (create_virtual_service, delete_virtual_service)
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Operator CRDs — per-org database provisioning (Decision 26)
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["mongodbcommunity.mongodb.com"]
    resources: ["mongodbcommunity"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["milvus.io"]
    resources: ["milvuses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-manager
  labels:
    app.kubernetes.io/name: tenant-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-manager
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
